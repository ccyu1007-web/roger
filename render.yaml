databases:
  - name: stock-db
    plan: free
    databaseName: stocks
    user: stockuser

services:
  - type: web
    name: stock-system
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TZ
        value: Asia/Taipei
