function parseNum(id) {
  const v = document.getElementById(id).value.replace(/,/g, '').trim();
  return v === '' ? null : parseFloat(v);
}

function fmtNum(v, dec) {
  if (v == null || isNaN(v)) return '-';
  return v.toLocaleString('zh-TW', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function calcEstimate() {
  const r1 = parseNum('estRev1');
  const r2 = parseNum('estRev2');
  const r3 = parseNum('estRev3');
  const gm = parseNum('estGM');
  const opex = parseNum('estOpex');
  const nonop = parseNum('estNonOp');
  const taxRate = parseNum('estTax');
  const pw = parseNum('estPW');

  // 累計營收
  const parts = [r1, r2, r3].filter(v => v != null);
  const cumK = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  const cumM = cumK != null ? cumK / 1000 : null;
  document.getElementById('estCumRevK').textContent = fmtNum(cumK, 0);
  document.getElementById('estCumRevM').textContent = fmtNum(cumM, 2);

  // 毛利 = 累計營收(百萬) * 毛利率%
  const gp = (cumM != null && gm != null) ? cumM * gm / 100 : null;
  document.getElementById('estGP').textContent = fmtNum(gp, 2);

  // 營業成本 = 累計營收(百萬) - 毛利
  const cogs = (cumM != null && gp != null) ? cumM - gp : null;
  document.getElementById('estCOGS').textContent = fmtNum(cogs, 2);

  // 營業利益 = 毛利 - 費用(百萬)
  const oi = (gp != null && opex != null) ? gp - opex : null;
  document.getElementById('estOI').textContent = fmtNum(oi, 2);

  // 營益率
  const oir = (oi != null && cumM && cumM !== 0) ? oi / cumM * 100 : null;
  document.getElementById('estOIR').textContent = fmtNum(oir, 2);

  // 稅前淨利
  const pti = (oi != null && nonop != null) ? oi + nonop : null;
  document.getElementById('estPTI').textContent = fmtNum(pti, 2);

  // 稅前淨利率
  const ptir = (pti != null && cumM && cumM !== 0) ? pti / cumM * 100 : null;
  document.getElementById('estPTIR').textContent = fmtNum(ptir, 2);

  // 稅
  const taxAmt = (pti != null && taxRate != null) ? pti * taxRate / 100 : null;
  document.getElementById('estTaxAmt').textContent = fmtNum(taxAmt, 2);

  // 稅後淨利
  const ni = (pti != null && taxRate != null) ? pti * (1 - taxRate / 100) : null;

  // 稅後淨利率
  const nir = (ni != null && cumM && cumM !== 0) ? ni / cumM * 100 : null;
  document.getElementById('estNIR').textContent = fmtNum(nir, 2);

  // 歸屬母公司淨利
  const nip = (ni != null && pw != null) ? ni * pw / 100 : null;
  document.getElementById('estNIP').textContent = fmtNum(nip, 2);

  // 估計 EPS
  const eps = (nip != null && _estSharesMillion && _estSharesMillion !== 0) ? nip / _estSharesMillion : null;
  document.getElementById('estEPS').textContent = fmtNum(eps, 2);
}

function calcEstimateYear() {
  const rev = parseNum('estRevYear');
  const gr = parseNum('estGrowthRate');
  const gm = parseNum('estGMYear');
  const opex = parseNum('estOpexYear');
  const nonop = parseNum('estNonOpYear');
  const taxRate = parseNum('estTaxYear');
  const pw = parseNum('estPWYear');

  // 累計營收 = 自訂營收 * (1 + 成長率%)
  const cumK = (rev != null && gr != null) ? rev * (1 + gr / 100) : (rev != null ? rev : null);
  const cumM = cumK != null ? cumK / 1000 : null;
  document.getElementById('estCumRevKYear').textContent = fmtNum(cumK, 0);
  document.getElementById('estCumRevMYear').textContent = fmtNum(cumM, 2);

  // 毛利 = 累計營收(百萬) * 毛利率%
  const gp = (cumM != null && gm != null) ? cumM * gm / 100 : null;
  document.getElementById('estGPYear').textContent = fmtNum(gp, 2);

  // 營業成本 = 累計營收(百萬) - 毛利
  const cogs = (cumM != null && gp != null) ? cumM - gp : null;
  document.getElementById('estCOGSYear').textContent = fmtNum(cogs, 2);

  // 營業利益 = 毛利 - 費用(百萬)
  const oi = (gp != null && opex != null) ? gp - opex : null;
  document.getElementById('estOIYear').textContent = fmtNum(oi, 2);

  const oir = (oi != null && cumM && cumM !== 0) ? oi / cumM * 100 : null;
  document.getElementById('estOIRYear').textContent = fmtNum(oir, 2);

  const pti = (oi != null && nonop != null) ? oi + nonop : null;
  document.getElementById('estPTIYear').textContent = fmtNum(pti, 2);

  const ptir = (pti != null && cumM && cumM !== 0) ? pti / cumM * 100 : null;
  document.getElementById('estPTIRYear').textContent = fmtNum(ptir, 2);

  const taxAmt = (pti != null && taxRate != null) ? pti * taxRate / 100 : null;
  document.getElementById('estTaxAmtYear').textContent = fmtNum(taxAmt, 2);

  const ni = (pti != null && taxRate != null) ? pti * (1 - taxRate / 100) : null;
  const nir = (ni != null && cumM && cumM !== 0) ? ni / cumM * 100 : null;
  document.getElementById('estNIRYear').textContent = fmtNum(nir, 2);

  const nip = (ni != null && pw != null) ? ni * pw / 100 : null;
  document.getElementById('estNIPYear').textContent = fmtNum(nip, 2);

  const eps = (nip != null && _estSharesMillion && _estSharesMillion !== 0) ? nip / _estSharesMillion : null;
  document.getElementById('estEPSYear').textContent = fmtNum(eps, 2);

  // EPS-本業 = 營業利益 * (1-稅率) * 歸屬權重 / 股數
  const epsCore = (oi != null && taxRate != null && pw != null && _estSharesMillion) ? oi * (1 - taxRate / 100) * pw / 100 / _estSharesMillion : null;
  document.getElementById('estEPScoreYear').textContent = fmtNum(epsCore, 2);

  const epsNonop = (eps != null && epsCore != null) ? eps - epsCore : null;
  document.getElementById('estEPSnonopYear').textContent = fmtNum(epsNonop, 2);
}

// ── 年度 EPS 彙總 ──
function calcAnnual() {
  const q1 = parseNum('estQ1');
  const q2 = parseNum('estQ2');
  const q3 = parseNum('estQ3');
  const q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  document.getElementById('annEPS').textContent = fmtNum(annEps, 2);
  calcValuation(annEps);
  _syncToValMethod();
}

function calcFromPR() {
  const q1 = parseNum('estQ1'), q2 = parseNum('estQ2'), q3 = parseNum('estQ3'), q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  const pr = parseNum('annPR');
  if (annEps != null && pr != null) {
    document.getElementById('annDiv').value = (annEps * pr / 100).toFixed(2);
  }
  calcValuation(annEps);
  calcYldRange();
  _syncToValMethod();
}

function calcFromDiv() {
  const q1 = parseNum('estQ1'), q2 = parseNum('estQ2'), q3 = parseNum('estQ3'), q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  const div = parseNum('annDiv');
  if (annEps != null && annEps !== 0 && div != null) {
    document.getElementById('annPR').value = (div / annEps * 100).toFixed(2);
  }
  calcValuation(annEps);
  calcYldRange();
  _syncToValMethod();
}

function calcValuation(annEps) {
  const div = parseNum('annDiv');
  // 本益比
  const pe = (annEps && annEps !== 0 && _estPrice) ? _estPrice / annEps : null;
  document.getElementById('annPE').textContent = pe != null ? pe.toFixed(2) : '-';
  // 殖利率
  const yld = (div && _estPrice && _estPrice !== 0) ? div / _estPrice * 100 : null;
  document.getElementById('annYield').textContent = yld != null ? yld.toFixed(2) + '%' : '-';
  renderMatrix();
}

function calcPERange() {
  const hi = parseNum('peHigh') || _peHi;
  const lo = parseNum('peLow') || _peLo;
  const fair  = (hi != null && lo != null) ? (hi + lo) / 2 : null;
  const above = (hi != null && fair != null) ? (hi + fair) / 2 : null;
  const below = (fair != null && lo != null) ? (fair + lo) / 2 : null;

  document.getElementById('peAbove').textContent = fmtNum(above, 2);
  document.getElementById('peFair').textContent  = fmtNum(fair, 2);
  document.getElementById('peBelow').textContent = fmtNum(below, 2);

  // 搭配預估 EPS 計算對應價格
  const q1 = parseNum('estQ1'), q2 = parseNum('estQ2'), q3 = parseNum('estQ3'), q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;

  document.getElementById('priceAbove').textContent = (above != null && annEps) ? fmtNum(above * annEps, 2) : '-';
  document.getElementById('priceFair').textContent  = (fair != null && annEps)  ? fmtNum(fair * annEps, 2) : '-';
  document.getElementById('priceBelow').textContent = (below != null && annEps) ? fmtNum(below * annEps, 2) : '-';
  renderMatrix();
}

function calcYldRange() {
  const yHigh = parseNum('yldHigh') || _yHigh;
  const yMax  = parseNum('yldMax') || _yMax;
  const yFair = (yHigh != null && yMax != null) ? (yHigh + yMax) / 2 : null;
  document.getElementById('yldFair').textContent = yFair != null ? yFair.toFixed(2) + '%' : '-';

  const div = parseNum('annDiv');
  document.getElementById('yldPriceHigh').textContent = (div && yHigh) ? fmtNum(div / yHigh * 100, 2) : '-';
  document.getElementById('yldPriceFair').textContent = (div && yFair) ? fmtNum(div / yFair * 100, 2) : '-';
  document.getElementById('yldPriceMax').textContent  = (div && yMax)  ? fmtNum(div / yMax * 100, 2) : '-';
  renderMatrix();
}

function _buildSysGradeBadge() {
  if (!_sysAnnual || !_sysAnnual.details) return '';
  const sa = _sysAnnual.details;
  const sPE = sa.est_pe, sYld = sa.est_yld;
  if (sPE == null || sYld == null) return '';

  // 使用自訂參數（與使用者等級一致）
  const peHi = parseNum('peHigh') || _peHi;
  const peLo = parseNum('peLow') || _peLo;
  const yHigh = parseNum('yldHigh') || _yHigh;
  const yMax  = parseNum('yldMax') || _yMax;
  const yFloor = _yldFloor;

  const peFair  = (peHi + peLo) / 2;
  const peAbove = (peHi + peFair) / 2;
  const peBelow = (peFair + peLo) / 2;

  const grades = [['AA','A2','BA2','觀察','臨界點','X'],['A1','A','B2','臨界點','X','X'],['BA1','B1','臨界點','X','X','X'],['觀察','臨界點','X','X','X','X']];
  const sPeCols = [{lo:-Infinity,hi:peLo},{lo:peLo,hi:peBelow},{lo:peBelow,hi:peFair},{lo:peFair,hi:peAbove},{lo:peAbove,hi:peHi},{lo:peHi,hi:Infinity}];
  const sYRows = [{lo:yMax,hi:Infinity},{lo:yHigh,hi:yMax},{lo:yFloor,hi:yHigh},{lo:-Infinity,hi:yFloor}];
  const sRow = sYRows.findIndex(r => sYld >= r.lo && sYld < r.hi);
  const sCol = sPeCols.findIndex(c => sPE >= c.lo && sPE < c.hi);
  if (sRow < 0 || sCol < 0) return '';
  const sg = grades[sRow][sCol];
  const sBadge = sg === 'AA' ? 'gb-aa' : (sg==='A'||sg==='A1'||sg==='A2') ? 'gb-a' : (sg==='BA1'||sg==='BA2') ? 'gb-ba' : (sg==='B1'||sg==='B2') ? 'gb-b' : sg==='觀察' ? 'gb-watch' : sg==='臨界點' ? 'gb-crit' : 'gb-x';
  return `<div><div class="grade-badge ${sBadge}"><span class="grade-label">系統評估等級：</span>${sg}</div>`
    + `<div style="margin-top:4px;font-size:.82rem;color:#0369a1">系統本益比 ${sPE.toFixed(2)} / 系統殖利率 ${sYld}%</div></div>`;
}

function renderMatrix() {
  const el = document.getElementById('matrixContainer');
  if (!el) return;

  // 優先自訂，fallback 預設
  const peHi = parseNum('peHigh') || _peHi;
  const peLo = parseNum('peLow') || _peLo;
  const yHigh = parseNum('yldHigh') || _yHigh;
  const yMax  = parseNum('yldMax') || _yMax;

  const peFair  = (peHi + peLo) / 2;
  const peAbove = (peHi + peFair) / 2;
  const peBelow = (peFair + peLo) / 2;
  const yFloor  = _yldFloor;

  // PE 區間（左→右，由小到大）
  const peCols = [
    { label: `< ${peLo.toFixed(1)}`, lo: -Infinity, hi: peLo },
    { label: `${peLo.toFixed(1)}~${peBelow.toFixed(1)}`, lo: peLo, hi: peBelow },
    { label: `${peBelow.toFixed(1)}~${peFair.toFixed(1)}`, lo: peBelow, hi: peFair },
    { label: `${peFair.toFixed(1)}~${peAbove.toFixed(1)}`, lo: peFair, hi: peAbove },
    { label: `${peAbove.toFixed(1)}~${peHi.toFixed(1)}`, lo: peAbove, hi: peHi },
    { label: `> ${peHi.toFixed(1)}`, lo: peHi, hi: Infinity },
  ];

  // 殖利率區間（上→下，由高到低）
  const yRows = [
    { label: `> ${yMax}%（最高）`, lo: yMax, hi: Infinity },
    { label: `${yHigh}%~${yMax}%（偏高~最高）`, lo: yHigh, hi: yMax },
    { label: `${yFloor}%~${yHigh}%（下限~偏高）`, lo: yFloor, hi: yHigh },
    { label: `< ${yFloor}%（低於下限）`, lo: -Infinity, hi: yFloor },
  ];

  // 矩陣評級（行=殖利率由高到低，列=本益比由低到高）
  const grades = [
    ['AA','A2','BA2','觀察','臨界點','X'],
    ['A1','A','B2','臨界點','X','X'],
    ['BA1','B1','臨界點','X','X','X'],
    ['觀察','臨界點','X','X','X','X'],
  ];
  const gradeClass = g => {
    if (g === 'AA') return 'g-aa';
    if (g === 'A' || g === 'A1' || g === 'A2') return 'g-a';
    if (g === 'BA1' || g === 'BA2') return 'g-ba';
    if (g === 'B1' || g === 'B2') return 'g-b';
    if (g === '觀察') return 'g-watch';
    if (g === '臨界點') return 'g-crit';
    return 'g-x';
  };

  // 計算目前位置
  const q1 = parseNum('estQ1'), q2 = parseNum('estQ2'), q3 = parseNum('estQ3'), q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  const curPE  = (annEps && annEps > 0 && _estPrice) ? _estPrice / annEps : null;
  const curDiv = parseNum('annDiv');
  const curYld = (curDiv && _estPrice && _estPrice > 0) ? curDiv / _estPrice * 100 : null;

  let curRow = -1, curCol = -1;
  if (curPE != null) { curCol = peCols.findIndex(c => curPE >= c.lo && curPE < c.hi); }
  if (curYld != null) { curRow = yRows.findIndex(r => curYld >= r.lo && curYld < r.hi); }

  // 等級 badge（左：使用者，右：系統）
  const gradeEl = document.getElementById('matrixGrade');
  let gradeHtml = '<div>';
  if (curRow >= 0 && curCol >= 0) {
    const g = grades[curRow][curCol];
    const badgeCls = g === 'AA' ? 'gb-aa' : (g==='A'||g==='A1'||g==='A2') ? 'gb-a'
      : (g==='BA1'||g==='BA2') ? 'gb-ba' : (g==='B1'||g==='B2') ? 'gb-b'
      : g==='觀察' ? 'gb-watch' : g==='臨界點' ? 'gb-crit' : 'gb-x';
    const peStr = curPE != null ? curPE.toFixed(2) : '-';
    const yldStr = curYld != null ? curYld.toFixed(2) + '%' : '-';
    gradeHtml += `<div class="grade-badge ${badgeCls}"><span class="grade-label">價值評估矩陣等級：</span>${g}</div>`
      + `<div style="margin-top:4px;font-size:.82rem;color:#64748b">本益比 ${peStr} / 殖利率 ${yldStr}</div>`;
  } else {
    gradeHtml += '<div class="grade-badge gb-na"><span class="grade-label">價值評估矩陣等級：</span>尚未計算</div>';
  }
  gradeHtml += '</div>';
  gradeHtml += _buildSysGradeBadge();
  gradeEl.innerHTML = gradeHtml;

  // 渲染表格
  let html = '<table class="vm-table"><thead><tr><th>殖利率 \\ 本益比</th>';
  peCols.forEach(c => html += `<th>${c.label}</th>`);
  html += '</tr></thead><tbody>';

  for (let ri = 0; ri < yRows.length; ri++) {
    html += `<tr><th>${yRows[ri].label}</th>`;
    for (let ci = 0; ci < peCols.length; ci++) {
      const g = grades[ri][ci];
      const isCur = (ri === curRow && ci === curCol);
      html += `<td class="${gradeClass(g)}${isCur ? ' g-cur' : ''}">${g}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function loadPEHistory() {
  const el = document.getElementById('peHistoryContainer');
  if (!el) return;
  try {
    const res = await fetch(`/api/stocks/${CODE}/pe-history`);
    const json = await res.json();
    if (!json.data || !json.data.length) {
      el.innerHTML = '<div style="color:#94a3b8;font-size:.85rem;padding:8px 0">無歷史本益比資料</div>';
      return;
    }
    renderPEHistory(json.data, json.estimate);
  } catch(e) {
    el.innerHTML = '<div style="color:#ef4444;font-size:.85rem">載入失敗</div>';
  }
}

function renderPEHistory(data, est) {
  const el = document.getElementById('peHistoryContainer');

  let html = '<div style="font-size:.88rem;font-weight:700;color:#1e3a5f;margin-bottom:4px">歷史本益比（近 8 年）</div>';
  html += '<table class="pe-hist-table"><thead><tr><th>年度</th>';
  data.forEach(d => html += `<th>${d.year - 1911}</th>`);
  html += '</tr></thead><tbody>';
  html += '<tr><td style="font-weight:600">最高</td>';
  data.forEach(d => html += `<td class="pe-high">${d.pe_high.toFixed(1)}</td>`);
  html += '</tr><tr><td style="font-weight:600">最低</td>';
  data.forEach(d => html += `<td class="pe-low">${d.pe_low.toFixed(1)}</td>`);
  html += '</tr></tbody></table>';

  // 推估：用可點擊的 chip 一行排列
  if (est && est.avg_high) {
    html += '<div class="est-row"><span style="color:#64748b">點擊套用：</span>';
    html += `<div class="est-chip" onclick="applyPE(${est.avg_high},${est.avg_low})">
      <span class="est-chip-label">平均</span><span class="pe-high">${est.avg_high}</span><span class="arrow">/</span><span class="pe-low">${est.avg_low}</span></div>`;
    html += `<div class="est-chip" onclick="applyPE(${est.median_high},${est.median_low})">
      <span class="est-chip-label">中位數</span><span class="pe-high">${est.median_high}</span><span class="arrow">/</span><span class="pe-low">${est.median_low}</span></div>`;
    if (est.trimmed_avg_high) {
      html += `<div class="est-chip" onclick="applyPE(${est.trimmed_avg_high},${est.trimmed_avg_low})">
        <span class="est-chip-label">去極值</span><span class="pe-high">${est.trimmed_avg_high}</span><span class="arrow">/</span><span class="pe-low">${est.trimmed_avg_low}</span></div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function applyPE(high, low) {
  document.getElementById('peHigh').value = high;
  document.getElementById('peLow').value = low;
  calcPERange();
}

function calcDDM() {
  if (!document.getElementById('ddmSell')) return;

  const eps = parseNum('ddmEps');
  const pe = parseNum('ddmPE');
  const rate = parseNum('ddmRate');
  const margin = parseNum('ddmMargin');

  const div1 = parseNum('ddmDiv1');
  const div2 = parseNum('ddmDiv2');
  const div3 = parseNum('ddmDiv3');

  const f = (v) => v != null && !isNaN(v) ? v.toFixed(2) : '-';
  const f4 = (v) => v != null && !isNaN(v) ? v.toFixed(4) : '-';
  const fPct = (v) => v != null && !isNaN(v) ? (v * 100).toFixed(2) + '%' : '-';
  const setCell = (id, text, css) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = css || '';
  };

  if (!eps || !pe || !rate || !margin) {
    ['ddmSell','ddmDf1','ddmDf2','ddmDf3','ddmPv1','ddmPv2','ddmPv3',
     'ddmIntrinsic','ddmRetI','ddmAnnI','ddmTarget1',
     'ddmSafe','ddmRetS','ddmAnnS','ddmTarget2',
     'ddmCur','ddmRetC','ddmAnnC','ddmTarget3'].forEach(id => setCell(id, '-'));
    return;
  }

  const curPrice = _estPrice || 0;
  const sellPrice = eps * pe;

  const df1 = 1 / Math.pow(1 + rate, 1);
  const df2 = 1 / Math.pow(1 + rate, 2);
  const df3 = 1 / Math.pow(1 + rate, 3);

  const pv1 = (0 + (div1 || 0)) * df1;
  const pv2 = (0 + (div2 || 0)) * df2;
  const pv3 = (sellPrice + (div3 || 0)) * df3;

  const intrinsic = pv1 + pv2 + pv3;
  const safePrice = intrinsic * margin;

  const totalDiv = (div1 || 0) + (div2 || 0) + (div3 || 0);
  const targetPrice = sellPrice + totalDiv;

  const calcReturn = (base) => {
    if (!base || base <= 0) return { ret: null, annRet: null };
    const ret = (targetPrice - base) / base;
    const annRet = Math.pow(1 + ret, 1/3) - 1;
    return { ret, annRet };
  };

  const rI = calcReturn(intrinsic);
  const rS = calcReturn(safePrice);
  const rC = calcReturn(curPrice);

  const clsR = (v) => v != null && v > 0 ? 'safe' : (v != null && v < 0 ? 'danger' : '');

  setCell('ddmSell', f(sellPrice), 'highlight');
  setCell('ddmDf1', f4(df1)); setCell('ddmDf2', f4(df2)); setCell('ddmDf3', f4(df3));
  setCell('ddmPv1', f(pv1)); setCell('ddmPv2', f(pv2)); setCell('ddmPv3', f(pv3));

  setCell('ddmIntrinsic', f(intrinsic), 'highlight');
  setCell('ddmRetI', fPct(rI.ret), clsR(rI.ret));
  setCell('ddmAnnI', fPct(rI.annRet), clsR(rI.annRet));
  setCell('ddmTarget1', f(targetPrice), 'highlight');

  setCell('ddmSafe', f(safePrice), 'highlight');
  setCell('ddmRetS', fPct(rS.ret), clsR(rS.ret));
  setCell('ddmAnnS', fPct(rS.annRet), clsR(rS.annRet));
  setCell('ddmTarget2', f(targetPrice));

  setCell('ddmCur', curPrice ? f(curPrice) : '-');
  setCell('ddmRetC', fPct(rC.ret), clsR(rC.ret));
  setCell('ddmAnnC', fPct(rC.annRet), clsR(rC.annRet));
  setCell('ddmTarget3', f(targetPrice));

  saveDDM();
}

function _syncToValMethod() {
  // 預估 EPS 區 → 逍遙評價法連動
  const q1 = parseNum('estQ1'), q2 = parseNum('estQ2'), q3 = parseNum('estQ3'), q4 = parseNum('estQ4');
  const parts = [q1, q2, q3, q4].filter(v => v != null);
  const annEps = parts.length > 0 ? parts.reduce((a, b) => a + b, 0) : null;
  const annDiv = parseNum('annDiv');
  if (annEps != null) document.getElementById('vmEps').value = annEps.toFixed(2);
  if (annDiv != null) document.getElementById('vmDiv').value = annDiv.toFixed(2);
  calcValMethod();
}

function calcValMethod() {
  const el = document.getElementById('vmResultContainer');
  if (!el) return;

  // 讀取參數（優先自訂，fallback 預設）
  const eps   = parseNum('vmEps');
  const div   = parseNum('vmDiv');
  const ltDiv = parseNum('vmLtDiv');
  const yHigh = parseNum('yldHigh') || _yHigh;
  const yMax  = parseNum('yldMax') || _yMax;
  const peHi  = parseNum('peHigh') || _peHi;
  const peLo  = parseNum('peLow') || _peLo;

  // 顯示自動帶入的殖利率
  const vmYH = document.getElementById('vmYldHigh');
  const vmYM = document.getElementById('vmYldMax');
  if (vmYH) vmYH.textContent = yHigh + '%';
  if (vmYM) vmYM.textContent = yMax + '%';

  if (!eps || !div) {
    el.innerHTML = '<div style="color:#94a3b8;font-size:.85rem;padding:8px 0">請先填入所有參數</div>';
    return;
  }

  const peFair  = (peHi + peLo) / 2;
  const peAbove = (peHi + peFair) / 2;
  const peBelow = (peFair + peLo) / 2;

  const yHighR = yHigh / 100;
  const yMaxR  = yMax / 100;

  // 第三項：長期股利/偏高殖利率 + 預估股利
  const ltYldR = _ltYld / 100;
  const ltTerm = (ltDiv != null && ltYldR > 0) ? (ltDiv / ltYldR + div) : null;

  // 各等級公式
  const gradeA  = Math.min(eps * peBelow, div / yHighR, ...(ltTerm != null ? [ltTerm] : []));
  const gradeA1 = Math.min(eps * peLo,    div / yHighR, ...(ltTerm != null ? [ltTerm] : []));
  const gradeA2 = Math.min(eps * peBelow, div / yMaxR,  ...(ltTerm != null ? [ltTerm] : []));
  const gradeAA = Math.min(eps * peLo,    div / yMaxR,  ...(ltTerm != null ? [ltTerm] : []));

  // 長期殖利率價格
  const lt5 = ltDiv != null ? ltDiv / 0.05 : null;
  const lt6 = ltDiv != null ? ltDiv / 0.06 : null;
  const lt7 = ltDiv != null ? ltDiv / 0.07 : null;

  const f = v => v != null && isFinite(v) ? v.toFixed(2) : '-';

  let html = '<table class="val-result-table"><thead><tr>';
  html += '<th>股價</th><th>A級評價</th><th>A1級評價</th><th>A2級評價</th><th>AA級評價</th>';
  html += '<th>長期5%</th><th>長期6%</th><th>長期7%</th>';
  html += '</tr></thead><tbody><tr>';
  html += `<td class="price-cell">${_estPrice ? _estPrice.toFixed(2) : '-'}</td>`;
  html += `<td class="grade-a">${f(gradeA)}</td>`;
  html += `<td class="grade-a">${f(gradeA1)}</td>`;
  html += `<td class="grade-a">${f(gradeA2)}</td>`;
  html += `<td class="grade-aa">${f(gradeAA)}</td>`;
  html += `<td class="grade-long">${f(lt5)}</td>`;
  html += `<td class="grade-long">${f(lt6)}</td>`;
  html += `<td class="grade-long">${f(lt7)}</td>`;
  html += '</tr></tbody></table>';

  el.innerHTML = html;
}

    ['流動負債合計', '流動負債', 0, 'cl'],
    ['應付公司債', '應付公司債', 1, 'ncl'],
    ['長期銀行借款', '長期銀行借款', 1, 'ncl'],
    ['非流動負債合計', '非流動負債', 0, 'ncl'],
    ['負債總額', '負債總額', 0, 'total_l'],
    ['股本', '股本', 1, 'eq'],
    ['資本公積', '資本公積', 1, 'eq'],
    ['保留盈餘', '保留盈餘', 1, 'eq'],
    ['母公司權益', '母公司權益', 0, 'eq'],
    ['股東權益總額', '股東權益總額', 0, 'total_eq'],
  ];

  const items = reportType === 'income_statement' ? isItems : bsItems;

  // 分組標題
  const isGroupTitles = { rev: '營業收入', exp: '營業費用', oi: '營業損益', tax: '稅務', ni: '淨利', eps: '每股盈餘', other: '其他指標' };
  const bsGroupTitles = { ca: '流動資產', nca: '非流動資產', total_a: '', cl: '流動負債', ncl: '非流動負債', total_l: '', eq: '股東權益', total_eq: '' };
  const groupTitles = reportType === 'income_statement' ? isGroupTitles : bsGroupTitles;

  // 排序期間
  const periods = Object.keys(periodData).sort((a, b) => {
    if (isQ) {
      const [ya, qa] = a.replace('Q', ' ').split(' ').map(Number);
      const [yb, qb] = b.replace('Q', ' ').split(' ').map(Number);
      return (yb * 10 + qb) - (ya * 10 + qa);
    }
    return parseInt(b) - parseInt(a);
  }).slice(0, 8);

  if (!periods.length) {
    panel.innerHTML = `<div class="loading">無資料</div>`;
    return;
  }

  // 格式化
  const fmtM = v => {
    if (v == null) return '-';
    const m = v / 1_000_000;
    return m.toLocaleString('zh-TW', { maximumFractionDigits: 0 });
  };
  const fmtEps = v => v == null ? '-' : v.toFixed(2);

  // 計算毛利率/營益率
  const calcRate = (period, num, den) => {
    const n = periodData[period]?.[num];
    const d = periodData[period]?.[den];
    if (n == null || !d) return null;
    return (n / d * 100).toFixed(1) + '%';
  };

  let html = `<div style="margin-bottom:8px;font-size:.82rem;color:#94a3b8">金額單位：百萬元${reportType === 'income_statement' ? '（EPS 除外）' : ''}</div>`;
  html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);font-size:.85rem">';

  // 表頭
  html += '<thead><tr style="background:#1e3a5f;color:#fff">';
  html += '<th style="padding:12px 16px;text-align:left;font-weight:600;min-width:140px;position:sticky;left:0;background:#1e3a5f;z-index:2">項目</th>';
  periods.forEach(p => {
    const display = isQ ? p : `${p} 年`;
    html += `<th style="padding:12px 14px;text-align:right;font-weight:600;white-space:nowrap">${display}</th>`;
  });
  html += '</tr></thead><tbody>';

  // 利率行
  if (reportType === 'income_statement') {
    // 毛利率
    html += '<tr style="background:#f0fdf4">';
    html += '<td style="padding:6px 16px;font-size:.8rem;color:#059669;font-weight:600">毛利率</td>';
    periods.forEach(p => {
      const rate = calcRate(p, '營業毛利', '營業收入');
      html += `<td style="padding:6px 14px;text-align:right;font-size:.8rem;color:#059669;font-weight:600">${rate || '-'}</td>`;
    });
    html += '</tr>';
    // 營益率
    html += '<tr style="background:#eff6ff">';
    html += '<td style="padding:6px 16px;font-size:.8rem;color:#2563eb;font-weight:600">營益率</td>';
    periods.forEach(p => {
      const rate = calcRate(p, '營業利益', '營業收入');
      html += `<td style="padding:6px 14px;text-align:right;font-size:.8rem;color:#2563eb;font-weight:600">${rate || '-'}</td>`;
    });
    html += '</tr>';
    // 淨利率
    html += '<tr style="background:#fefce8;border-bottom:2px solid #e2e8f0">';
    html += '<td style="padding:6px 16px;font-size:.8rem;color:#a16207;font-weight:600">淨利率</td>';
    periods.forEach(p => {
      const ni = periodData[p]?.['歸屬母公司淨利'] ?? periodData[p]?.['本期淨利'];
      const rev = periodData[p]?.['營業收入'];
      const rate = ni != null && rev ? (ni / rev * 100).toFixed(1) + '%' : '-';
      html += `<td style="padding:6px 14px;text-align:right;font-size:.8rem;color:#a16207;font-weight:600">${rate}</td>`;
    });
    html += '</tr>';
  }

  let lastGroup = null;
  items.forEach(([label, key, level, group]) => {
    const hasData = periods.some(p => periodData[p]?.[key] != null);
    if (!hasData) return;

    // 分組標題行
    if (group !== lastGroup && groupTitles[group]) {
      lastGroup = group;
      html += `<tr><td colspan="${periods.length + 1}" style="padding:8px 16px 4px;font-size:.76rem;color:#94a3b8;font-weight:700;text-transform:uppercase;border-top:2px solid #e2e8f0">${groupTitles[group]}</td></tr>`;
    }
    lastGroup = group;

    const isTotal = level === 0;
    const bg = isTotal ? '#f8fafc' : '#fff';
    const fw = isTotal ? '700' : '400';
    const indent = isTotal ? '16px' : '28px';
    const borderB = isTotal ? '1px solid #e2e8f0' : '1px solid #f1f5f9';

    html += `<tr style="background:${bg};border-bottom:${borderB}">`;
    html += `<td style="padding:8px ${indent};font-weight:${fw};white-space:nowrap;position:sticky;left:0;background:${bg};z-index:1">${label}</td>`;

    periods.forEach((p, pi) => {
      const val = periodData[p]?.[key];
      const formatted = key === 'EPS' ? fmtEps(val) : fmtM(val);
      const isNeg = val != null && val < 0;
      const color = isNeg ? '#ef4444' : (isTotal ? '#1e293b' : '#475569');

      // YoY 成長率（和上一期比）
      let yoyHtml = '';
      if (pi < periods.length - 1 && val != null) {
        const prevVal = periodData[periods[pi + 1]]?.[key];
        if (prevVal != null && prevVal !== 0 && key !== 'EPS') {
          const yoy = ((val - prevVal) / Math.abs(prevVal) * 100).toFixed(1);
          const yoyColor = yoy > 0 ? '#059669' : yoy < 0 ? '#ef4444' : '#94a3b8';
          yoyHtml = `<div style="font-size:.7rem;color:${yoyColor}">${yoy > 0 ? '+' : ''}${yoy}%</div>`;
        }
      }

      html += `<td style="padding:8px 14px;text-align:right;color:${color};font-weight:${fw}">
        <div>${formatted}</div>${yoyHtml}
      </td>`;
    });
    html += '</tr>';
  });

  // 資產負債表加計算比率
  if (reportType === 'balance_sheet') {
    html += `<tr><td colspan="${periods.length + 1}" style="padding:8px 16px 4px;font-size:.76rem;color:#94a3b8;font-weight:700;border-top:2px solid #e2e8f0">財務比率</td></tr>`;
    // 負債比
    html += '<tr style="background:#fef2f2;border-bottom:1px solid #f1f5f9">';
    html += '<td style="padding:6px 16px;font-size:.82rem;color:#dc2626;font-weight:600">負債比率</td>';
    periods.forEach(p => {
      const tl = periodData[p]?.['負債總額'];
      const ta = periodData[p]?.['資產總額'];
      const rate = tl != null && ta ? (tl / ta * 100).toFixed(1) + '%' : '-';
      html += `<td style="padding:6px 14px;text-align:right;font-size:.82rem;color:#dc2626;font-weight:600">${rate}</td>`;
    });
    html += '</tr>';
    // 流動比
    html += '<tr style="background:#eff6ff;border-bottom:1px solid #f1f5f9">';
    html += '<td style="padding:6px 16px;font-size:.82rem;color:#2563eb;font-weight:600">流動比率</td>';
    periods.forEach(p => {
      const ca = periodData[p]?.['流動資產'];
      const cl = periodData[p]?.['流動負債'];
      const rate = ca != null && cl ? (ca / cl * 100).toFixed(1) + '%' : '-';
      html += `<td style="padding:6px 14px;text-align:right;font-size:.82rem;color:#2563eb;font-weight:600">${rate}</td>`;
    });
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  panel.innerHTML = html;
}

async function loadIndustry() {
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div>載入同業資料中...</div></div>';
  try {
    const res = await fetch(`/api/industry-compare/${CODE}`);
    if (!res.ok) { panel.innerHTML = '<div class="loading">無產業分類資料</div>'; return; }
    indData = await res.json();
    updateTitle({ name: indData.name });
    renderIndustry();
  } catch(e) { panel.innerHTML = '<div class="loading" style="color:#ef4444">載入失敗</div>'; }
}

const IND_METRICS = [
  { key: 'pe',              label: '本益比',       unit: 'x',  fmt: v => v != null ? v.toFixed(1)+'x' : '-' },
  { key: 'eps_y1',          label: 'EPS',          unit: '元', fmt: v => v != null ? v.toFixed(2) : '-' },
  { key: 'eps_growth',      label: 'EPS成長',      unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'revenue_yoy',     label: '營收YoY',      unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'revenue_cum_yoy', label: '累計營收YoY',  unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'yield_pct',       label: '殖利率',       unit: '%',  fmt: v => v != null ? v.toFixed(2)+'%' : '-' },
  { key: 'change_240d',     label: '240日漲跌',    unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
];

function barColor(pct) {
  if (pct >= 75) return '#059669';
  if (pct >= 50) return '#2563eb';
  if (pct >= 25) return '#f59e0b';
  return '#94a3b8';
}

function renderIndustry() {
  const d = indData;
  const panel = document.getElementById('panel');

  // 排名摘要卡片
  let summaryHtml = '';
  for (const m of IND_METRICS) {
    const s = d.summary[m.key];
    if (!s) {
      summaryHtml += `<div class="ind-card"><div class="label">${m.label}</div><div class="rank">-</div></div>`;
      continue;
    }
    summaryHtml += `
      <div class="ind-card">
        <div class="label">${m.label}</div>
        <div class="rank">${s.rank}<small> / ${s.total}</small></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${s.percentile}%;background:${barColor(s.percentile)}"></div></div>
        <div class="pct">勝過 ${s.percentile}% 同業</div>
      </div>`;
  }

  // 表格
  let tableHtml = `
    <div class="ind-filter">
      <input type="text" id="indSearch" placeholder="搜尋代碼或名稱..." oninput="filterIndTable()">
      <select id="indMarket" onchange="filterIndTable()">
        <option value="">全部</option><option value="上市">上市</option><option value="上櫃">上櫃</option>
      </select>
      <span class="ind-count">共 ${d.peer_count} 家</span>
    </div>
    <div class="ind-table-wrap">
    <table class="ind-table">
      <thead><tr>
        <th onclick="sortInd('name')">公司</th>
        <th onclick="sortInd('close')">股價</th>`;
  for (const m of IND_METRICS) {
    tableHtml += `<th onclick="sortInd('${m.key}')">${m.label}</th>`;
  }
  tableHtml += '</tr></thead><tbody id="indBody">';
  tableHtml += '</tbody></table></div>';

  panel.innerHTML = `
    <div class="ind-header">
      <span class="ind-badge">${d.industry}</span>
      <span class="ind-count">${d.name} 在 ${d.peer_count} 家同業中的排名</span>
    </div>
    <div class="ind-summary">${summaryHtml}</div>
    ${tableHtml}`;

  renderIndRows();
}

function renderIndRows() {
  const d = indData;
  let peers = [...d.peers];
  const q = document.getElementById('indSearch')?.value.trim().toLowerCase() || '';
  const mkt = document.getElementById('indMarket')?.value || '';

  if (q) peers = peers.filter(p => p.code.toLowerCase().includes(q) || (p.name||'').toLowerCase().includes(q));
  if (mkt) peers = peers.filter(p => p.market === mkt);

  // 排序
  const sk = indSort.key;
  peers.sort((a, b) => {
    let va = sk === 'name' ? (a.name||'') : (a[sk] ?? null);
    let vb = sk === 'name' ? (b.name||'') : (b[sk] ?? null);
    if (va === null && vb === null) return 0;
    if (va === null) return 1;
    if (vb === null) return -1;
    if (typeof va === 'string') return indSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return indSort.asc ? va - vb : vb - va;
  });

  const body = document.getElementById('indBody');
  if (!body) return;
  let html = '';
  for (const p of peers) {
    const isTarget = p.code === CODE;
    const cls = isTarget ? ' class="row-target"' : '';
    html += `<tr${cls}>`;
    html += `<td><a href="/company.html?code=${p.code}" style="color:#2563eb;text-decoration:none;font-weight:${isTarget?700:500}">${p.code} ${p.name||''}</a></td>`;
    html += `<td>${p.close != null ? p.close.toFixed(1) : '-'}</td>`;
    for (const m of IND_METRICS) {
      const v = p[m.key];
      let cls2 = '';
      if (m.key !== 'pe' && v != null) cls2 = v > 0 ? ' class="v-pos"' : v < 0 ? ' class="v-neg"' : '';
      html += `<td${cls2}>${m.fmt(v)}</td>`;
    }
    html += '</tr>';
  }
  body.innerHTML = html;
}

function sortInd(key) {
  if (indSort.key === key) indSort.asc = !indSort.asc;
  else { indSort.key = key; indSort.asc = key === 'pe'; }
  renderIndRows();
}

function filterIndTable() { renderIndRows(); }

// ── 啟動 ──
if (CODE) {
  const _initTab = new URLSearchParams(location.search).get('tab');
  if (_initTab === 'decision') {
    switchTab('decision');
  } else {
    loadFinancial();
  }
  loadImportantNews();
}
</script>
