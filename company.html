let indData = null;
let indSort = { key: 'pe', asc: true };

async function loadIndustry() {
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div>載入同業資料中...</div></div>';
  try {
    const res = await fetch(`/api/industry-compare/${CODE}`);
    if (!res.ok) { panel.innerHTML = '<div class="loading">無產業分類資料</div>'; return; }
    indData = await res.json();
    updateTitle({ name: indData.name });
    renderIndustry();
  } catch(e) { panel.innerHTML = '<div class="loading" style="color:#ef4444">載入失敗</div>'; }
}

const IND_METRICS = [
  { key: 'pe',              label: '本益比',       unit: 'x',  fmt: v => v != null ? v.toFixed(1)+'x' : '-' },
  { key: 'eps_y1',          label: 'EPS',          unit: '元', fmt: v => v != null ? v.toFixed(2) : '-' },
  { key: 'eps_growth',      label: 'EPS成長',      unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'revenue_yoy',     label: '營收YoY',      unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'revenue_cum_yoy', label: '累計營收YoY',  unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
  { key: 'yield_pct',       label: '殖利率',       unit: '%',  fmt: v => v != null ? v.toFixed(2)+'%' : '-' },
  { key: 'change_240d',     label: '240日漲跌',    unit: '%',  fmt: v => v != null ? v.toFixed(1)+'%' : '-' },
];

function barColor(pct) {
  if (pct >= 75) return '#059669';
  if (pct >= 50) return '#2563eb';
  if (pct >= 25) return '#f59e0b';
  return '#94a3b8';
}

function renderIndustry() {
  const d = indData;
  const panel = document.getElementById('panel');

  // 排名摘要卡片
  let summaryHtml = '';
  for (const m of IND_METRICS) {
    const s = d.summary[m.key];
    if (!s) {
      summaryHtml += `<div class="ind-card"><div class="label">${m.label}</div><div class="rank">-</div></div>`;
      continue;
    }
    summaryHtml += `
      <div class="ind-card">
        <div class="label">${m.label}</div>
        <div class="rank">${s.rank}<small> / ${s.total}</small></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${s.percentile}%;background:${barColor(s.percentile)}"></div></div>
        <div class="pct">勝過 ${s.percentile}% 同業</div>
      </div>`;
  }

  // 表格
  let tableHtml = `
    <div class="ind-filter">
      <input type="text" id="indSearch" placeholder="搜尋代碼或名稱..." oninput="filterIndTable()">
      <select id="indMarket" onchange="filterIndTable()">
        <option value="">全部</option><option value="上市">上市</option><option value="上櫃">上櫃</option>
      </select>
      <span class="ind-count">共 ${d.peer_count} 家</span>
    </div>
    <div class="ind-table-wrap">
    <table class="ind-table">
      <thead><tr>
        <th onclick="sortInd('name')">公司</th>
        <th onclick="sortInd('close')">股價</th>`;
  for (const m of IND_METRICS) {
    tableHtml += `<th onclick="sortInd('${m.key}')">${m.label}</th>`;
  }
  tableHtml += '</tr></thead><tbody id="indBody">';
  tableHtml += '</tbody></table></div>';

  panel.innerHTML = `
    <div class="ind-header">
      <span class="ind-badge">${d.industry}</span>
      <span class="ind-count">${d.name} 在 ${d.peer_count} 家同業中的排名</span>
    </div>
    <div class="ind-summary">${summaryHtml}</div>
    ${tableHtml}`;

  renderIndRows();
}

function renderIndRows() {
  const d = indData;
  let peers = [...d.peers];
  const q = document.getElementById('indSearch')?.value.trim().toLowerCase() || '';
  const mkt = document.getElementById('indMarket')?.value || '';

  if (q) peers = peers.filter(p => p.code.toLowerCase().includes(q) || (p.name||'').toLowerCase().includes(q));
  if (mkt) peers = peers.filter(p => p.market === mkt);

  // 排序
  const sk = indSort.key;
  peers.sort((a, b) => {
    let va = sk === 'name' ? (a.name||'') : (a[sk] ?? null);
    let vb = sk === 'name' ? (b.name||'') : (b[sk] ?? null);
    if (va === null && vb === null) return 0;
    if (va === null) return 1;
    if (vb === null) return -1;
    if (typeof va === 'string') return indSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return indSort.asc ? va - vb : vb - va;
  });

  const body = document.getElementById('indBody');
  if (!body) return;
  let html = '';
  for (const p of peers) {
    const isTarget = p.code === CODE;
    const cls = isTarget ? ' class="row-target"' : '';
    html += `<tr${cls}>`;
    html += `<td><a href="/company.html?code=${p.code}" style="color:#2563eb;text-decoration:none;font-weight:${isTarget?700:500}">${p.code} ${p.name||''}</a></td>`;
    html += `<td>${p.close != null ? p.close.toFixed(1) : '-'}</td>`;
    for (const m of IND_METRICS) {
      const v = p[m.key];
      let cls2 = '';
      if (m.key !== 'pe' && v != null) cls2 = v > 0 ? ' class="v-pos"' : v < 0 ? ' class="v-neg"' : '';
      html += `<td${cls2}>${m.fmt(v)}</td>`;
    }
    html += '</tr>';
  }
  body.innerHTML = html;
}

function sortInd(key) {
  if (indSort.key === key) indSort.asc = !indSort.asc;
  else { indSort.key = key; indSort.asc = key === 'pe'; }
  renderIndRows();
}

function filterIndTable() { renderIndRows(); }
