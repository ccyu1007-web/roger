<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>載入中...</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; overscroll-behavior-x: none; }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header .back-link {
    color: rgba(255,255,255,.8); text-decoration: none; font-size: .88rem;
  }
  header .back-link:hover { color: #fff; }

  .container { max-width: 1300px; margin: 0 auto; padding: 0 16px 32px; }

  /* ── 分頁標籤 ── */
  .tabs {
    display: flex; gap: 0; background: #fff;
    border-bottom: 2px solid #e2e8f0;
    border-radius: 10px 10px 0 0;
    margin-top: 20px;
    box-shadow: 0 -1px 6px rgba(0,0,0,.04);
  }
  .tab {
    padding: 14px 28px; font-size: .95rem; font-weight: 600;
    color: #64748b; cursor: pointer; border: none; background: none;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all .15s;
  }
  .tab:hover { color: #2563eb; }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

  /* ── 內容區 ── */
  .panel {
    background: #fff; border-radius: 0 0 10px 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,.08);
    overflow-x: auto;
  }

  /* ── Loading ── */
  .loading { text-align: center; padding: 60px; color: #94a3b8; font-size: .95rem; }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 年度財報表格 ── */
  .fs-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .fs-table th, .fs-table td {
    padding: 9px 20px; white-space: nowrap; text-align: right;
    border-bottom: 1px solid #e8ecf1;
    font-variant-numeric: tabular-nums;
    border-left: 1px solid #e8ecf1;
  }
  .fs-table th:first-child, .fs-table td:first-child { border-left: none; }
  .fs-table .col-label {
    text-align: left; position: sticky; left: 0; z-index: 1;
    background: #fff; font-weight: 500; color: #334155;
    min-width: 190px; padding-left: 20px;
  }
  .fs-table thead th {
    background: #1e3a5f; color: #fff; font-weight: 700;
    font-size: .9rem; padding: 12px 20px; letter-spacing: .5px;
    position: sticky; top: 0; z-index: 2;
    border-left-color: rgba(255,255,255,.15);
  }
  .fs-table thead th:first-child {
    z-index: 3; background: #1e3a5f; text-align: left; padding-left: 20px;
    border-left: none;
  }
  .fs-table .sec-row td {
    background: #f0f4ff; font-weight: 700; color: #3730a3; font-size: .82rem;
    padding: 8px 20px 8px 14px; text-align: left;
    border-bottom: 2px solid #c7d2fe; border-left: none;
  }
  .fs-table .row-hl .col-label { font-weight: 700; color: #1e3a5f; background: #f4f7fb; }
  .fs-table .row-hl td { background: #f4f7fb; font-weight: 600; }
  .fs-table tbody tr:nth-child(even):not(.sec-row):not(.row-hl) td { background: #fafbfd; }
  .fs-table tbody tr:nth-child(even):not(.sec-row):not(.row-hl) .col-label { background: #fafbfd; }
  .fs-table tbody tr:not(.sec-row):hover td { background: #eef4ff; }
  .fs-table tbody tr:not(.sec-row):hover .col-label { background: #eef4ff; }
  .fs-table .v-neg { color: #dc2626; font-weight: 500; }
  .fs-table .v-pos { color: #059669; font-weight: 500; }
  .fs-table .v-neutral { color: #334155; }
  .fs-table .v-empty { color: #d1d5db; text-align: center; }
  .fs-table .fin-grade-row td {
    background: #fefce8; font-weight: 700; font-size: .88rem;
    text-align: center; border-bottom: 2px solid #eab308;
  }
  .fs-table .fin-grade-row td:first-child {
    background: #fefce8; text-align: left; color: #92400e; font-size: .82rem;
  }
  .fg-aa  { color: #991b1b; }
  .fg-a   { color: #dc2626; }
  .fg-b   { color: #2563eb; }
  .fg-c   { color: #6b7280; }
  .fg-d   { color: #94a3b8; }
  .fs-footer {
    padding: 10px 20px; color: #94a3b8; font-size: .78rem;
    border-top: 1px solid #e2e8f0; background: #fafbfd;
  }

  /* ── 估算計算器 ── */
  .est-wrap {
    border-top: 3px solid #2563eb; background: #fff; padding: 24px 28px;
    border-radius: 0 0 10px 10px;
  }
  .est-title {
    font-size: 1rem; font-weight: 700; color: #1e3a5f;
    margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .est-save {
    padding: 5px 16px; border-radius: 6px; border: 1px solid #2563eb;
    background: #2563eb; color: #fff; font-size: .82rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .est-save:hover { background: #1d4ed8; }
  .est-date { font-size: .82rem; color: #94a3b8; font-weight: 400; margin-left: auto; }
  .est-grid {
    display: grid; gap: 0;
    font-size: .88rem;
  }
  .est-grid .lbl {
    padding: 8px 0; color: #475569; font-weight: 500;
    display: flex; align-items: center;
  }
  .est-grid .val {
    padding: 8px 0; display: flex; align-items: center;
  }
  .est-grid input {
    width: 180px; padding: 6px 12px; border: 1px solid #cbd5e1;
    border-radius: 6px; font-size: .88rem; outline: none;
    font-variant-numeric: tabular-nums;
  }
  .est-grid input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .est-grid .computed {
    font-weight: 600; color: #1e3a5f; font-variant-numeric: tabular-nums;
    min-height: 28px; display: flex; align-items: center;
  }
  .est-grid .sep {
    grid-column: 1 / -1; border-top: 1px solid #e2e8f0; margin: 6px 0;
  }
  .est-grid .result-label { font-weight: 600; color: #334155; }
  .est-grid .sys {
    padding: 8px 0; display: flex; align-items: center;
    font-weight: 600; color: #7c3aed; font-variant-numeric: tabular-nums;
    font-size: .85rem;
  }
  .est-grid .sys-hdr {
    padding: 8px 0; font-weight: 700; color: #7c3aed; font-size: .82rem;
    border-bottom: 2px solid #8b5cf6;
  }
  .est-grid .val-hdr {
    padding: 8px 0; font-weight: 700; color: #2563eb; font-size: .82rem;
    border-bottom: 2px solid #2563eb;
  }
  .est-grid .ann-col { color: #0369a1; }
  .est-grid .result-val { font-weight: 700; color: #1e3a5f; font-size: .95rem; }
  .est-grid .result-highlight { color: #2563eb; font-size: 1.05rem; }

  /* ── 質性研究筆記 ── */
  .notes-wrap {
    border-top: 3px solid #059669; background: #fff; padding: 20px 28px;
    border-radius: 0 0 10px 10px;
  }
  .notes-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .notes-title { font-size: 1rem; font-weight: 700; color: #059669; }
  .notes-status { font-size: .78rem; color: #94a3b8; }
  .notes-area {
    width: 100%; min-height: 200px; padding: 14px 16px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
    font-size: .9rem; line-height: 1.7; color: #1a202c;
    resize: vertical; outline: none;
  }
  .notes-area:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,.1); }
  .notes-area::placeholder { color: #cbd5e1; }

  /* ── 年度彙總 & 估值 ── */
  .est-annual {
    border-top: 2px solid #e2e8f0; margin-top: 20px; padding-top: 20px;
  }
  .est-annual-title { font-size: .92rem; font-weight: 700; color: #1e3a5f; margin-bottom: 12px; }
  .est-q-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .est-q-item { display: flex; align-items: center; gap: 6px; }
  .est-q-item label { font-size: .85rem; color: #475569; font-weight: 600; white-space: nowrap; }
  .est-q-item input {
    width: 100px; padding: 5px 10px; border: 1px solid #cbd5e1;
    border-radius: 6px; font-size: .85rem; outline: none; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .est-q-item input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .est-annual-eps {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: .95rem; font-weight: 700; color: #2563eb;
    background: #eef2ff; padding: 4px 14px; border-radius: 6px;
  }
  .est-val-grid {
    display: grid; grid-template-columns: 180px 160px 140px; gap: 0;
    font-size: .88rem; max-width: 520px; margin-top: 14px;
  }
  .est-val-grid .sys-v {
    padding: 7px 0; font-weight: 600; color: #0369a1;
    font-variant-numeric: tabular-nums; font-size: .85rem;
    display: flex; align-items: center;
  }
  .est-val-grid .lbl { padding: 7px 0; color: #475569; font-weight: 500; display: flex; align-items: center; }
  .est-val-grid .val { padding: 7px 0; display: flex; align-items: center; }
  .est-val-grid input {
    width: 140px; padding: 5px 10px; border: 1px solid #cbd5e1;
    border-radius: 6px; font-size: .88rem; outline: none; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .est-val-grid input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .est-val-grid .computed { font-weight: 600; color: #1e3a5f; font-variant-numeric: tabular-nums; }
  .est-val-grid .sep { grid-column: 1 / -1; border-top: 1px solid #e2e8f0; margin: 4px 0; }
  .est-price-box {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #1e3a5f, #2563eb); color: #fff;
    padding: 6px 18px; border-radius: 8px; font-weight: 700; font-size: 1rem;
  }

  /* ── 價值評估矩陣 ── */
  .matrix-wrap {
    border-top: 2px solid #e2e8f0; margin-top: 20px; padding-top: 20px;
  }
  .matrix-title {
    font-size: 1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px;
  }
  .matrix-floor {
    display: flex; align-items: center; gap: 6px; font-size: .85rem; font-weight: 400; color: #475569;
  }
  .matrix-floor input {
    width: 60px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 5px;
    font-size: .85rem; text-align: right; outline: none;
  }
  .matrix-floor input:focus { border-color: #2563eb; }
  .vm-table {
    border-collapse: collapse; font-size: .82rem; margin-top: 10px; width: auto;
  }
  .vm-table th, .vm-table td {
    border: 1px solid #cbd5e1; padding: 8px 14px; text-align: center;
    min-width: 72px; white-space: nowrap;
  }
  .vm-table thead th { background: #1e3a5f; color: #fff; font-weight: 600; }
  .vm-table tbody th { background: #f1f5f9; font-weight: 600; color: #334155; text-align: left; }
  .vm-table .g-aa  { background: #dc2626; color: #fff; font-weight: 700; }
  .vm-table .g-a   { background: #ef4444; color: #fff; font-weight: 700; }
  .vm-table .g-ba  { background: #f59e0b; color: #fff; font-weight: 700; }
  .vm-table .g-b   { background: #d97706; color: #fff; font-weight: 600; }
  .vm-table .g-watch { background: #3b82f6; color: #fff; font-weight: 600; }
  .vm-table .g-crit  { background: #a16207; color: #fff; font-weight: 600; }
  .vm-table .g-x     { background: #e2e8f0; color: #94a3b8; }
  .vm-table .g-cur   { outline: 3px solid #000; outline-offset: -2px; }
  .grade-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 20px; border-radius: 8px; font-size: 1.05rem; font-weight: 700;
  }
  .grade-badge .grade-label { font-size: .88rem; font-weight: 500; color: #475569; }
  .grade-badge.gb-aa  { background: #dc2626; color: #fff; }
  .grade-badge.gb-a   { background: #ef4444; color: #fff; }
  .grade-badge.gb-ba  { background: #f59e0b; color: #fff; }
  .grade-badge.gb-b   { background: #d97706; color: #fff; }
  .grade-badge.gb-watch { background: #3b82f6; color: #fff; }
  .grade-badge.gb-crit  { background: #a16207; color: #fff; }
  .grade-badge.gb-x     { background: #94a3b8; color: #fff; }
  .grade-badge.gb-na    { background: #e2e8f0; color: #94a3b8; }

  /* ── 歷史本益比 ── */
  .pe-hist-table { border-collapse: collapse; font-size: .85rem; margin-top: 8px; }
  .pe-hist-table th, .pe-hist-table td {
    padding: 7px 16px; border: 1px solid #e2e8f0; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .pe-hist-table thead th { background: #1e3a5f; color: #fff; font-weight: 600; }
  .pe-hist-table tbody tr:nth-child(even) { background: #fafbfd; }
  .pe-hist-table tbody tr:hover td { background: #eef4ff; }
  .pe-hist-table .pe-high { color: #dc2626; font-weight: 600; }
  .pe-hist-table .pe-low  { color: #16a34a; font-weight: 600; }
  .est-row {
    display: flex; gap: 6px; flex-wrap: nowrap; align-items: center;
    margin-top: 8px; font-size: .82rem;
  }
  .est-chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 6px;
    padding: 5px 12px; cursor: pointer; transition: all .15s;
  }
  .est-chip:hover { background: #dbeafe; border-color: #93c5fd; }
  .est-chip-label { color: #6366f1; font-weight: 600; }
  .est-chip .pe-high { color: #dc2626; font-weight: 700; }
  .est-chip .pe-low  { color: #16a34a; font-weight: 700; }
  .est-chip .arrow { color: #94a3b8; font-size: .7rem; }

  /* ── 逍遙評價法 ── */
  .val-method {
    border-top: 3px solid #7c3aed; background: #fff; padding: 24px 28px;
    border-radius: 0 0 10px 10px; margin-top: 0;
  }
  .val-method-title { font-size: 1.05rem; font-weight: 700; color: #7c3aed; margin-bottom: 14px; }
  .val-inputs {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .val-inp-group {
    display: flex; align-items: center; gap: 6px; font-size: .85rem;
  }
  .val-inp-group label {
    background: #f0ecff; color: #6d28d9; padding: 4px 10px; border-radius: 5px;
    font-weight: 600; font-size: .8rem; white-space: nowrap;
  }
  .val-inp-group input {
    width: 100px; padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: .85rem; text-align: right; outline: none;
  }
  .val-inp-group input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.12); }
  .val-inp-group .auto-val {
    font-weight: 600; color: #6d28d9; min-width: 50px;
  }
  .val-result-table { border-collapse: collapse; font-size: .85rem; width: 100%; margin-top: 8px; }
  .val-result-table th, .val-result-table td {
    padding: 10px 16px; border: 1px solid #e2e8f0; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .val-result-table thead th {
    background: #7c3aed; color: #fff; font-weight: 600;
  }
  .val-result-table tbody td { font-weight: 600; color: #334155; }
  .val-result-table .price-cell { background: #f8fafc; }
  .val-result-table .grade-a { background: #fef2f2; color: #dc2626; font-weight: 700; }
  .val-result-table .grade-aa { background: #fef2f2; color: #991b1b; font-weight: 700; }
  .val-result-table .grade-long { background: #f0fdf4; color: #166534; font-weight: 600; }
  .val-global-note { font-size: .76rem; color: #94a3b8; margin-top: 4px; }

  /* ── 股利折現模式 ── */
  .ddm-wrap {
    border-top: 3px solid #0369a1; background: #fff; padding: 24px 28px;
    border-radius: 10px; margin-top: 16px;
  }
  .ddm-title { font-size: 1.05rem; font-weight: 700; color: #0369a1; margin-bottom: 14px; }
  .ddm-inputs {
    display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .ddm-inp-group {
    display: flex; align-items: center; gap: 6px; font-size: .85rem;
  }
  .ddm-inp-group label {
    background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 5px;
    font-weight: 600; font-size: .8rem; white-space: nowrap;
  }
  .ddm-inp-group input {
    width: 90px; padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: .85rem; text-align: right; outline: none;
  }
  .ddm-inp-group input:focus { border-color: #0369a1; box-shadow: 0 0 0 3px rgba(3,105,161,.12); }
  .ddm-table { border-collapse: collapse; font-size: .85rem; width: 100%; }
  .ddm-table th, .ddm-table td {
    padding: 8px 14px; border: 1px solid #e2e8f0; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .ddm-table thead th {
    background: #0369a1; color: #fff; font-weight: 600; text-align: center;
  }
  .ddm-table .row-label { text-align: left; font-weight: 600; color: #334155; background: #f8fafc; white-space: nowrap; }
  .ddm-table .summary-row td { border-top: 2px solid #0369a1; }
  .ddm-table .highlight { color: #0369a1; font-weight: 700; }
  .ddm-table .danger { color: #dc2626; }
  .ddm-table .safe { color: #16a34a; }
  .ddm-table input {
    width: 80px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 5px;
    font-size: .85rem; text-align: right; outline: none;
  }
  .ddm-table input:focus { border-color: #0369a1; }

  /* ── 決策檢核表 ── */
  .chk-summary { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding: 16px 20px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; flex-wrap: wrap; }
  .chk-price { font-size: 1.3rem; font-weight: 700; color: #1e293b; }
  .chk-score { font-size: 1.1rem; font-weight: 700; padding: 4px 14px; border-radius: 20px; }
  .chk-score-pass { background: #dcfce7; color: #166534; }
  .chk-score-warn { background: #fef3c7; color: #92400e; }
  .chk-score-fail { background: #fee2e2; color: #dc2626; }
  .chk-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  .chk-table th { padding: 10px 14px; background: #1e3a5f; color: #fff; font-weight: 600; text-align: center; }
  .chk-table th:nth-child(1) { width: 50px; }
  .chk-table th:nth-child(2) { text-align: left; }
  .chk-table th:nth-child(3), .chk-table th:nth-child(4) { width: 70px; }
  .chk-table td { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
  .chk-table td:first-child { text-align: center; font-weight: 700; color: #64748b; }
  .chk-table .chk-cond { color: #334155; line-height: 1.5; }
  .chk-table .chk-detail { font-size: .78rem; color: #94a3b8; margin-top: 3px; }
  .chk-table .chk-yes, .chk-table .chk-no { text-align: center; font-size: 1.1rem; font-weight: 700; border-left: 1px solid #e2e8f0; }
  .chk-table .chk-yes { color: #16a34a; }
  .chk-table .chk-no { color: #dc2626; }
  .chk-table tbody tr:hover { background: #f8fafc; }

  /* 保留舊的供其他區塊用 */
  .dec-section { margin-bottom: 24px; }
  .dec-title { font-size: 1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #2563eb; }
  .dec-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .dec-table th, .dec-table td { padding: 7px 12px; border: 1px solid #e2e8f0; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .dec-table thead th { background: #1e3a5f; color: #fff; font-weight: 600; text-align: center; position: sticky; top: 0; }
  .dec-table .row-label { text-align: left; font-weight: 600; color: #334155; background: #f8fafc; }

  .dec-cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .dec-card { flex: 1; min-width: 220px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; }
  .dec-card-title { font-size: .78rem; color: #64748b; font-weight: 600; margin-bottom: 8px; }
  .dec-card-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: .85rem; }
  .dec-card-label { color: #475569; }
  .dec-card-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .val-hit { padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .val-aa { background: #fee2e2; color: #dc2626; }
  .val-a1 { background: #fef3c7; color: #92400e; }
  .val-a2 { background: #fef3c7; color: #92400e; }
  .val-a { background: #dbeafe; color: #1d4ed8; }
  .val-lt6 { background: #dcfce7; color: #166534; }
  .grade-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.78rem; font-weight:700; }
  .grade-A { background:#fee2e2; color:#dc2626; }
  .grade-B { background:#fff7ed; color:#ea580c; }
  .grade-C { background:#f1f5f9; color:#94a3b8; }
  .inst-pos { color: #dc2626; font-weight: 600; }
  .inst-neg { color: #16a34a; font-weight: 600; }

  /* ── 月營收表格 ── */
  .rev-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .rev-table th, .rev-table td {
    padding: 10px 16px; white-space: nowrap; text-align: right;
    border-bottom: 1px solid #e8ecf1;
  }
  .rev-table .col-month {
    text-align: center; font-weight: 700; color: #1e3a5f;
    background: #f8fafc; width: 52px; min-width: 52px;
    position: sticky; left: 0; z-index: 1;
    border-right: 2px solid #cbd5e1;
  }
  .rev-table .year-band {
    text-align: center; font-weight: 700; font-size: .95rem;
    padding: 10px 14px; letter-spacing: 1px;
  }
  .rev-table .year-band.y0 { background: #1e3a5f; color: #fff; }
  .rev-table .year-band.y1 { background: #2563eb; color: #fff; }
  .rev-table .year-band.y2 { background: #7c3aed; color: #fff; }
  .rev-table .sub-hdr {
    background: #f1f5f9; color: #475569; font-weight: 600;
    font-size: .8rem; padding: 7px 16px; text-align: right;
    border-bottom: 2px solid #cbd5e1;
  }
  .rev-table .grp-end { border-right: 2px solid #cbd5e1; }
  .rev-table tbody tr:nth-child(even) { background: #fafbfd; }
  .rev-table tbody tr:hover td { background: #eef4ff; }
  .rev-table tbody tr:hover .col-month { background: #dbeafe; }
  .rev-table .rev-val { color: #1e293b; font-weight: 500; font-variant-numeric: tabular-nums; }
  .rev-table .rate-pos { color: #dc2626; font-weight: 500; }
  .rev-table .rate-neg { color: #16a34a; font-weight: 500; }
  .rev-table .rate-zero { color: #94a3b8; }
  .rev-table .empty { color: #d1d5db; text-align: center; }
  .rev-footer {
    padding: 10px 20px; color: #94a3b8; font-size: .78rem;
    border-top: 1px solid #e2e8f0; background: #fafbfd;
    border-radius: 0 0 10px 10px;
  }

  /* ── 同業比較 ── */
  .ind-header {
    padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .ind-badge {
    background: #1e3a5f; color: #fff; padding: 6px 16px; border-radius: 20px;
    font-size: .88rem; font-weight: 600;
  }
  .ind-count { color: #64748b; font-size: .85rem; }

  .ind-summary {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; padding: 16px 24px;
  }
  .ind-card {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: 14px; text-align: center;
  }
  .ind-card .label { font-size: .75rem; color: #64748b; margin-bottom: 6px; }
  .ind-card .rank { font-size: 1.15rem; font-weight: 700; color: #1e3a5f; }
  .ind-card .rank small { font-size: .75rem; font-weight: 400; color: #94a3b8; }
  .ind-card .bar-wrap {
    height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 8px; overflow: hidden;
  }
  .ind-card .bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .ind-card .pct { font-size: .72rem; color: #94a3b8; margin-top: 4px; }

  .ind-table-wrap { padding: 0 24px 20px; overflow-x: auto; }
  .ind-table {
    width: 100%; border-collapse: collapse; font-size: .82rem; margin-top: 4px;
  }
  .ind-table th, .ind-table td {
    padding: 8px 12px; border-bottom: 1px solid #e2e8f0; text-align: right;
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .ind-table th {
    background: #1e3a5f; color: #fff; font-weight: 600;
    position: sticky; top: 0; cursor: pointer; user-select: none;
  }
  .ind-table th:hover { background: #2563eb; }
  .ind-table th:first-child, .ind-table td:first-child { text-align: left; position: sticky; left: 0; z-index: 1; background: inherit; }
  .ind-table td:first-child { background: #fff; }
  .ind-table tbody tr:nth-child(even) td { background: #fafbfd; }
  .ind-table tbody tr:nth-child(even) td:first-child { background: #fafbfd; }
  .ind-table tbody tr:hover td { background: #eef4ff; }
  .ind-table tbody tr:hover td:first-child { background: #eef4ff; }
  .ind-table .row-target td { background: #dbeafe !important; font-weight: 600; }
  .ind-table .row-target td:first-child { background: #dbeafe !important; }
  .ind-table .v-pos { color: #dc2626; }
  .ind-table .v-neg { color: #16a34a; }
  .ind-filter {
    padding: 12px 24px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .ind-filter input {

    font-size: .85rem; outline: none; width: 180px;
  }
  .ind-filter input:focus { border-color: #2563eb; }
  .ind-filter select {
    padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: .85rem; outline: none;
  }
</style>

<body>

<header>
  <h1 id="pageTitle">載入中...</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <input type="text" id="jumpInput" placeholder="輸入代碼跳轉"
      style="width:130px;padding:5px 10px;border:none;border-radius:6px;font-size:.85rem;outline:none"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)location.href='/company.html?code='+v;}">
    <a href="/" class="back-link">< 回總表</a>
    <a href="/company_guide.html" target="_blank" style="color:#2563eb;font-size:.82rem;margin-left:16px">欄位說明</a>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab" id="tabDecision" onclick="switchTab('decision')">檢核清單</button>
    <button class="tab active" id="tabFinancial" onclick="switchTab('financial')">年度財報</button>
    <button class="tab" id="tabQuarterly" onclick="switchTab('quarterly')">季度估計表</button>
    <button class="tab" id="tabRevenue" onclick="switchTab('revenue')">月營收</button>
    <button class="tab" id="tabIndustry" onclick="switchTab('industry')">同業比較</button>
    <button class="tab" id="tabISA" onclick="switchTab('is_annual')">損益表(年)</button>
    <button class="tab" id="tabISQ" onclick="switchTab('is_quarterly')">損益表(季)</button>
    <button class="tab" id="tabBSA" onclick="switchTab('bs_annual')">資產負債表(年)</button>
    <button class="tab" id="tabBSQ" onclick="switchTab('bs_quarterly')">資產負債表(季)</button>
  </div>
  <div class="panel" id="panel">
    <div class="loading"><div class="spinner"></div><div>載入資料中...</div></div>
  </div>
  <div id="importantNews" style="margin-top:16px"></div>
</div>

<script>
const CODE = new URLSearchParams(location.search).get('code');
if (!CODE) { document.getElementById('panel').innerHTML = '<div class="loading">缺少股票代碼</div>'; }

let currentTab = 'financial';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabDecision').classList.toggle('active', tab === 'decision');
  document.getElementById('tabFinancial').classList.toggle('active', tab === 'financial');
  document.getElementById('tabQuarterly').classList.toggle('active', tab === 'quarterly');
  document.getElementById('tabRevenue').classList.toggle('active', tab === 'revenue');
  document.getElementById('tabIndustry').classList.toggle('active', tab === 'industry');
  document.getElementById('tabISA').classList.toggle('active', tab === 'is_annual');
  document.getElementById('tabISQ').classList.toggle('active', tab === 'is_quarterly');
  document.getElementById('tabBSA').classList.toggle('active', tab === 'bs_annual');
  document.getElementById('tabBSQ').classList.toggle('active', tab === 'bs_quarterly');
  if (tab === 'decision') loadDecision();
  else if (tab === 'financial') loadFinancial();
  else if (tab === 'quarterly') loadQuarterly();
  else if (tab === 'revenue') loadRevenue();
  else if (tab === 'is_annual') loadDetail('income_statement', 'annual');
  else if (tab === 'is_quarterly') loadDetail('income_statement', 'quarterly');
  else if (tab === 'bs_annual') loadDetail('balance_sheet', 'annual');
  else if (tab === 'bs_quarterly') loadDetail('balance_sheet', 'quarterly');
  else loadIndustry();
}

// ── 載入檢核清單（從 DB 讀取）──
async function loadDecision() {
  const panel = document.getElementById('panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div>載入檢核表...</div></div>';
  try {
    const [clRes, sRes, noteRes, ueRes] = await Promise.all([
      fetch(`/api/stocks/${CODE}/checklist`),
      fetch(`/api/stocks?exact=${CODE}`),
      fetch(`/api/user-notes/${CODE}`),
      fetch(`/api/user-estimates/${CODE}`)
    ]);
    const cl = await clRes.json();
    const sData = await sRes.json();
    const noteData = await noteRes.json();
    const ueData = await ueRes.json();
    const stock = (sData.data || [])[0] || {};

    // 預估 EPS/股利（使用者手動輸入）
    let _estEps = null, _estDiv = null;
    const _qs = [ueData.q1, ueData.q2, ueData.q3, ueData.q4].map(v => v ? parseFloat(v) : null).filter(v => v != null);
    if (_qs.length > 0) _estEps = Math.round(_qs.reduce((a,b) => a+b, 0) * 100) / 100;
    if (ueData.div) _estDiv = parseFloat(ueData.div);

    const close = stock.close;
    const chg = stock.change;
    const fmtV = v => v != null ? Number(v).toFixed(2) : '-';
    const chgStr = chg != null ? `<span style="color:${chg > 0 ? '#dc2626' : chg < 0 ? '#16a34a' : '#64748b'};font-weight:600">${chg > 0 ? '+' : ''}${chg.toFixed(2)}</span>` : '-';

    const condLabels = [
      '近五年有 3 年以上財務等級 B 級以上，且近兩年都 B 級以上',
      '累積營收年增率 >= -10% 且 < 0%',
      '累積營收年增率 >= 0%',
      '沈董本益比 > 0 且 < 14',
      '沈董殖利率 >= 5.5%',
      '沈董等級 A 級以上',
      '綜合等級 A 級以上',
      '加權等級 A 級以上',
      '預估等級 A 級以上',
      '目前股價低於總表評價 A',
      '目前股價低於總表評價 AA',
      '綜合殖利率 >= 6%',
      '股利折現模式現價潛在年報酬 >= 10%',
    ];

    const detail = cl.detail || {};
    const passCount = cl.pass_count || 0;
    const totalCount = cl.total_count || 13;
    const scoreClass = passCount >= totalCount * 0.8 ? 'chk-score-pass' : passCount >= totalCount * 0.5 ? 'chk-score-warn' : 'chk-score-fail';

    let html = '';
    html += '<div class="chk-summary">';
    html += `<span class="chk-price">${CODE} ${stock.name || ''} ${fmtV(close)} ${chgStr}</span>`;
    html += `<span class="chk-score ${scoreClass}">${passCount} / ${totalCount} 通過</span>`;
    html += '</div>';

    html += '<table class="chk-table">';
    html += '<thead><tr><th>#</th><th>條件</th><th>是</th><th>否</th></tr></thead>';
    html += '<tbody>';
    for (let i = 1; i <= 13; i++) {
      const pass = cl[`chk_${i}`] === 1;
      const d = detail[`chk_${i}`] || '';
      html += '<tr>';
      html += `<td>${i}</td>`;
      html += `<td class="chk-cond">${condLabels[i-1]}`;
      if (d) html += `<div class="chk-detail">${d}</div>`;
      html += '</td>';
      html += `<td class="chk-yes">${pass ? 'V' : ''}</td>`;
      html += `<td class="chk-no">${pass ? '' : 'X'}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table>';

    // === 配息率歷史（近5年）===
    {
      const payoutYears = [];
      for (let i = 1; i <= 5; i++) {
        const lbl = stock[`eps_y${i}_label`];
        const eps = stock[`eps_y${i}`];
        const div = stock[`div_c${i}`];
        if (lbl) payoutYears.push({ year: lbl, eps, div });
      }
      if (payoutYears.length > 0) {
        const _f = v => v != null ? Number(v).toFixed(2) : '-';
        const _shenEps = stock.shen_eps;
        const _shenDiv = stock.shen_div;
        const _thBase = 'padding:8px 10px;background:#1e3a5f;color:#fff;font-weight:700';
        const _tdBase = 'padding:8px 10px;border:1px solid #e2e8f0';
        const _tdEst = 'padding:8px 10px;border:1px solid #e2e8f0;background:#eff6ff';
        const _tdShen = 'padding:8px 10px;border:1px solid #e2e8f0;background:#f0fdf4';

        html += '<div style="margin-top:24px;padding:16px 20px;background:#fff;border-radius:10px;border:1px solid #e2e8f0">';
        html += '<div style="font-size:1rem;font-weight:700;color:#1e3a5f;margin-bottom:12px">配息率歷史（近 ' + payoutYears.length + ' 年）</div>';
        html += '<table style="width:100%;border-collapse:collapse;font-size:.85rem;text-align:center">';
        html += '<thead><tr><th style="' + _thBase + ';width:80px">年度</th>';
        html += `<th style="${_thBase};background:#2563eb">預估</th>`;
        html += `<th style="${_thBase};background:#059669">沈董</th>`;
        payoutYears.forEach(y => { html += `<th style="${_thBase}">${y.year}</th>`; });
        html += '</tr></thead><tbody>';

        // EPS
        html += `<tr><td style="${_tdBase};font-weight:600;color:#1e3a5f">EPS</td>`;
        html += `<td style="${_tdEst};font-weight:600">${_f(_estEps)}</td>`;
        html += `<td style="${_tdShen};font-weight:600">${_f(_shenEps)}</td>`;
        payoutYears.forEach(y => { html += `<td style="${_tdBase}">${_f(y.eps)}</td>`; });

        // 現金股利
        html += `</tr><tr><td style="${_tdBase};font-weight:600;color:#1e3a5f">現金股利</td>`;
        html += `<td style="${_tdEst};font-weight:600">${_f(_estDiv)}</td>`;
        html += `<td style="${_tdShen};font-weight:600">${_f(_shenDiv)}</td>`;
        payoutYears.forEach(y => { html += `<td style="${_tdBase}">${_f(y.div)}</td>`; });

        // 配息率
        html += `</tr><tr><td style="${_tdBase};font-weight:600;color:#1e3a5f">配息率</td>`;
        // 預估配息率
        let _estPr = '-';
        if (_estEps != null && _estEps > 0 && _estDiv != null) _estPr = Math.round(_estDiv / _estEps * 100) + '%';
        else if (_estEps != null && _estEps <= 0 && _estDiv != null && _estDiv > 0) _estPr = '100%';
        html += `<td style="${_tdEst};font-weight:700;color:#2563eb">${_estPr}</td>`;
        // 沈董配息率
        let _shenPr = '-';
        if (_shenEps != null && _shenEps > 0 && _shenDiv != null) _shenPr = Math.round(_shenDiv / _shenEps * 100) + '%';
        else if (_shenEps != null && _shenEps <= 0 && _shenDiv != null && _shenDiv > 0) _shenPr = '100%';
        html += `<td style="${_tdShen};font-weight:700;color:#2563eb">${_shenPr}</td>`;
        payoutYears.forEach(y => {
          let pr = '-';
          if (y.eps != null && y.eps > 0 && y.div != null) pr = Math.round(y.div / y.eps * 100) + '%';
          else if (y.eps != null && y.eps <= 0 && y.div != null && y.div > 0) pr = '100%';
          html += `<td style="${_tdBase};font-weight:700;color:#2563eb">${pr}</td>`;
        });
        html += '</tr></tbody></table></div>';
      }
    }

    // === 逍遙價值投資評價法（從 DB）===
    if (cl.eps_setting != null || cl.val_a != null) {
      const f = v => v != null ? Number(v).toFixed(2) : '-';
      html += '<div style="margin-top:24px;padding:16px 20px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">';
      html += '<div style="font-size:1rem;font-weight:700;color:#7c3aed;margin-bottom:12px">逍遙價值投資評價法</div>';
      html += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem;margin-bottom:12px">';
      html += `<span><span style="color:#7c3aed;font-weight:600">EPS設定</span> ${f(cl.eps_setting)}</span>`;
      html += `<span><span style="color:#7c3aed;font-weight:600">股利設定</span> ${f(cl.div_setting)}</span>`;
      html += `<span><span style="color:#dc2626;font-weight:600">偏高殖利率</span> ${cl.yld_high || 5.5}%</span>`;
      html += `<span><span style="color:#dc2626;font-weight:600">最高殖利率</span> ${cl.yld_max || 6}%</span>`;
      html += '</div>';
      html += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem;margin-bottom:12px">';
      html += `<span><span style="color:#7c3aed;font-weight:600">長期現金股利水準</span> ${f(cl.lt_div)}</span>`;
      html += `<span><span style="color:#7c3aed;font-weight:600">長期殖利率設定</span> ${cl.lt_yld || 6}%</span>`;
      html += '</div>';
      html += '<table style="width:100%;border-collapse:collapse;font-size:.85rem;text-align:center">';
      html += '<thead><tr>';
      ['股價','A級評價','A1級評價','A2級評價','AA級評價','長期5%','長期6%','長期7%'].forEach(h => {
        html += `<th style="padding:8px 10px;background:#6d28d9;color:#fff;font-weight:600">${h}</th>`;
      });
      html += '</tr></thead><tbody><tr>';
      html += `<td style="padding:8px 10px;border:1px solid #e2e8f0;font-weight:600">${f(close)}</td>`;
      const valCells = [
        { v: cl.val_a, cls: '#16a34a' }, { v: cl.val_a1, cls: '#6d28d9' },
        { v: cl.val_a2, cls: '#6d28d9' }, { v: cl.val_aa, cls: '#6d28d9' },
        { v: cl.lt5, cls: '#166534' }, { v: cl.lt6, cls: '#166534' }, { v: cl.lt7, cls: '#166534' },
      ];
      valCells.forEach(c => {
        const hit = c.v != null && close != null && close <= c.v;
        html += `<td style="padding:8px 10px;border:1px solid #e2e8f0;font-weight:600;color:${c.cls}${hit ? ';background:#fef3c7' : ''}">${f(c.v)}</td>`;
      });
      html += '</tr></tbody></table>';
      // 資料來源註記
      const _epsSrc = _estEps != null ? '預估EPS' : (stock.shen_eps != null ? '沈董EPS' : '無');
      const _divSrc = _estDiv != null ? '預估股利' : (stock.shen_div != null ? '沈董股利' : '無');
      const _ltSrc = cl.lt_div != null ? '綜合股利（沈董×60%+加權×40%）' : '無';
      html += `<div style="font-size:.75rem;color:#94a3b8;margin-top:8px;line-height:1.6">`;
      html += `EPS設定來源：${_epsSrc}　|　股利設定來源：${_divSrc}　|　長期現金股利水準來源：${_ltSrc}`;
      html += '</div></div>';
    }

    // === 質性研究筆記 ===
    const noteContent = noteData.content || '';
    if (noteContent) {
      html += '<div style="margin-top:24px;padding:16px 20px;background:#fff;border-radius:10px;border:1px solid #e2e8f0">';
      html += '<div style="font-size:1rem;font-weight:700;color:#1e3a5f;margin-bottom:10px">質性研究筆記</div>';

      html += `<div style="text-align:right;font-size:.75rem;color:#94a3b8;margin-top:8px">檢核表更新：${cl.updated_at}</div>`;
    }

    panel.innerHTML = html;
  } catch(e) {

function calcFinGrade(d) {
  const roe = d.roe;
  const opm = d.operating_margin;
  const rev = d.revenue;
  const fcf = d.fcf;
  if (roe == null || rev == null || rev === 0 || fcf == null) return null;

  const fcfRatio = fcf / rev * 100;  // FCF/營收 (%)

  // 基礎等級：ROE (Y軸) × FCF/營收 (X軸)
  let base;
  if (roe >= 15) {
    base = fcfRatio < 0 ? 'B1A' : fcfRatio < 5 ? 'A1' : 'AA';
  } else if (roe >= 10) {
    base = fcfRatio < 0 ? 'B1' : fcfRatio < 5 ? 'A' : 'A2';
  } else if (roe >= 7) {
    base = fcfRatio < 0 ? 'C' : fcfRatio < 5 ? 'B2' : 'B2A';
  } else {
    base = fcfRatio < 0 ? 'D' : 'C';
  }

  // 營益率加減號
  let suffix = '';
  if (opm != null) {
    if (opm >= 10) suffix = '+';
    else if (opm < 5) suffix = '-';
  }

  return base + suffix;
}

// ── 月營收渲染 ──
function renderRevenueTable(json) {
  const years = json.years;

    if (v == null) return '<td class="empty">-</td>';
    return `<td class="rev-val">${Math.round(v / 1000).toLocaleString('zh-TW')}</td>`;
  };
  const fmtRate = (v, isLast) => {
    if (v == null) return `<td class="empty${isLast ? ' grp-end' : ''}">-</td>`;
    const cls = v > 0 ? 'rate-pos' : v < 0 ? 'rate-neg' : 'rate-zero';
    const sign = v > 0 ? '+' : '';
    return `<td class="${cls}${isLast ? ' grp-end' : ''}">${sign}${v.toFixed(2)}%</td>`;
  };

  let html = '<table class="rev-table"><thead>';
  html += '<tr><th rowspan="2" class="col-month" style="border-bottom:2px solid #cbd5e1">月</th>';
  for (let i = 0; i < years.length; i++) {
    html += `<th colspan="4" class="year-band y${i} grp-end">${years[i]}</th>`;
  }
  html += '</tr><tr>';
  for (let i = 0; i < years.length; i++) {
    html += '<th class="sub-hdr">營收</th>';
    html += '<th class="sub-hdr">月增率</th>';
    html += '<th class="sub-hdr">年增率</th>';
    html += '<th class="sub-hdr grp-end">累積年增率</th>';
  }
  html += '</tr></thead><tbody>';

  for (const row of data) {
    html += `<tr><td class="col-month">${row.month}</td>`;
    for (let i = 0; i < years.length; i++) {
      const d = row[String(years[i])] || {};
      html += fmtRev(d.revenue);
      html += fmtRate(d.mom, false);
      html += fmtRate(d.yoy, false);
      html += fmtRate(d.cum_yoy, true);
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  html += '<div class="rev-footer">單位：仟元</div>';
  document.getElementById('panel').innerHTML = html;
}

// ── EPS 估算計算器 ──
function buildEstimator(sharesMillion, sysQuarters, annData) {
  const sharesDisplay = sharesMillion ? sharesMillion.toFixed(2) : '-';
  const n = sysQuarters.length;
  const hasAnn = annData && !annData.error;
  const totalSysCols = n + (hasAnn ? 1 : 0);
  const sysCols = totalSysCols > 0 ? ' ' + Array(totalSysCols).fill('140px').join(' ') : '';
  const gridStyle = `grid-template-columns: 180px 200px 200px${sysCols}`;

  const confMap = {A:{color:'#059669',label:'高'}, B:{color:'#d97706',label:'中'}, C:{color:'#dc2626',label:'低'}};
  const fM = v => v != null ? (v / 1000000).toLocaleString('zh-TW', {maximumFractionDigits: 0}) : '-';
  const fK = v => v != null ? Math.round(v / 1000).toLocaleString('zh-TW') : '-';
  const fP = (v, dec) => v != null ? v.toFixed(dec || 2) + '%' : '-';
  const fN = (v, dec) => v != null ? v.toFixed(dec || 2) : '-';

  // 季估算資料
  const sysData = sysQuarters.map(sq => {
    const d = sq.details;
    const mr = d.monthly_revs || [];
    const conf = confMap[sq.confidence] || {color:'#94a3b8',label:'-'};
    return {
      quarter: sq.quarter, confidence: sq.confidence, conf,
      has_actual: sq.has_actual, actual_eps: sq.actual_eps,
      rev1: mr[0] ? Math.round(mr[0].revenue / 1000).toLocaleString('zh-TW') + (mr[0].is_actual ? '' : '*') : '-',
      rev2: mr[1] ? Math.round(mr[1].revenue / 1000).toLocaleString('zh-TW') + (mr[1].is_actual ? '' : '*') : '-',
      rev3: mr[2] ? Math.round(mr[2].revenue / 1000).toLocaleString('zh-TW') + (mr[2].is_actual ? '' : '*') : '-',
      cumRevK: fK(d.est_revenue), cumRevM: fM(d.est_revenue),
      gp: (d.est_revenue != null && d.est_gm != null) ? fM(d.est_revenue * d.est_gm / 100) : '-',
      cogs: (d.est_revenue != null && d.est_gm != null) ? fM(d.est_revenue * (1 - d.est_gm / 100)) : '-',
      gm: fP(d.est_gm), opex: fM(d.est_opex), nonop: fM(d.est_nonop),
      tax: fP(d.est_tax_rate), pw: fP(d.est_pw),
      oi: fM(d.est_oi),
      oir: d.est_revenue > 0 ? fP(d.est_oi / d.est_revenue * 100) : '-',
      pti: fM(d.est_pti),
      ptir: d.est_revenue > 0 ? fP(d.est_pti / d.est_revenue * 100) : '-',
      taxAmt: (d.est_pti != null && d.est_tax_rate != null) ? fM(d.est_pti * d.est_tax_rate / 100) : '-',
      nir: d.est_revenue > 0 && d.est_ni != null ? fP(d.est_ni / d.est_revenue * 100) : '-',
      nip: fM(d.est_nip),
      shares: d.est_shares ? (d.est_shares / 1000000).toFixed(2) : '-',
      eps: sq.est_eps, epsStr: fN(sq.est_eps),
      epsCore: fN(d.est_eps_core), epsNonop: fN(d.est_eps_nonop),
      yoy_eps: d.yoy_eps, issues: d.issues || [],
      rev_actual: d.rev_actual, rev_estimated: d.rev_estimated,
    };
  });

  // 年度估算資料
  let ann = null;
  if (hasAnn) {
    const ad = annData.details;
    const aConf = confMap[annData.confidence] || {color:'#94a3b8',label:'-'};
    ann = {
      target: annData.target, conf: aConf,
      revGrowth: ad.rev_growth_pct != null ? (ad.rev_growth_pct >= 0 ? '+' : '') + ad.rev_growth_pct.toFixed(2) + '%' : '-',
      adjGrowth: ad.adj_growth_pct != null ? (ad.adj_growth_pct >= 0 ? '+' : '') + ad.adj_growth_pct.toFixed(2) + '%' : '-',
      cumRevK: fK(ad.est_revenue), cumRevM: fM(ad.est_revenue),
      gp: (ad.est_revenue != null && ad.est_gm != null) ? fM(ad.est_revenue * ad.est_gm / 100) : '-',
      cogs: (ad.est_revenue != null && ad.est_gm != null) ? fM(ad.est_revenue * (1 - ad.est_gm / 100)) : '-',
      gm: fP(ad.est_gm), opex: fM(ad.est_opex), nonop: fM(ad.est_nonop),
      tax: fP(ad.est_tax_rate), pw: fP(ad.est_pw),
      oi: fM(ad.est_oi),
      oir: ad.est_revenue > 0 ? fP(ad.est_oi / ad.est_revenue * 100) : '-',
      pti: fM(ad.est_pti),
      ptir: ad.est_revenue > 0 ? fP(ad.est_pti / ad.est_revenue * 100) : '-',
      taxAmt: (ad.est_pti != null && ad.est_tax_rate != null) ? fM(ad.est_pti * ad.est_tax_rate / 100) : '-',
      nir: ad.est_revenue > 0 && ad.est_ni != null ? fP(ad.est_ni / ad.est_revenue * 100) : '-',
      nip: fM(ad.est_nip),
      shares: ad.est_shares ? (ad.est_shares / 1000000).toFixed(2) : '-',
      eps: annData.est_eps, epsStr: fN(annData.est_eps),
      epsCore: fN(ad.est_eps_core), epsNonop: fN(ad.est_eps_nonop),

      nMonths: ad.n_months,
      payout: ad.est_payout, div: ad.est_div, pe: ad.est_pe, yld: ad.est_yld,

  }

  // 生成系統欄 helper（季 + 年度）
  const sysCells = (field, annField) => {
    let h = sysData.map(s => `<div class="sys">${s[field]}</div>`).join('');

  };

  // headers
  const sysHdrs = sysData.map(s =>
    `<div class="sys-hdr">${s.quarter}` +
    `<span style="font-size:.68rem;color:#fff;background:${s.conf.color};padding:1px 6px;border-radius:8px;margin-left:4px">${s.conf.label}</span>` +
    (s.has_actual ? '<span style="font-size:.68rem;color:#059669;margin-left:4px">已公布</span>' : '') +
    `</div>`

    `<span style="font-size:.68rem;color:#fff;background:${ann.conf.color};padding:1px 6px;border-radius:8px;margin-left:4px">${ann.conf.label}</span>` +
    `</div>` : '');

  return `
  <div class="est-wrap">

      <div class="val-hdr">自行估算(季)</div>
      <div class="val-hdr">自行估算(年)</div>

      <div class="lbl">自訂營收（仟元）</div>
      <div class="val"><input id="estRev1" type="text" placeholder="月營收 1" oninput="calcEstimate()"></div>

      ${sysCells('rev1', '')}
      <div class="lbl">自訂營收（仟元）</div>
      <div class="val"><input id="estRev2" type="text" placeholder="月營收 2" oninput="calcEstimate()"></div>
      <div class="val"></div>
      ${sysCells('rev2', '')}
      <div class="lbl">自訂營收（仟元）</div>
      <div class="val"><input id="estRev3" type="text" placeholder="月營收 3" oninput="calcEstimate()"></div>
      <div class="val"></div>
      ${sysCells('rev3', ann ? `<span style="font-size:.75rem;color:#0369a1">成長率 ${ann.revGrowth}</span><br><span style="font-size:.68rem;color:#94a3b8">調整後 ${ann.adjGrowth}</span>` : '')}
      <div class="lbl">成長率（%）</div>
      <div class="val"></div>
      <div class="val"><input id="estGrowthRate" type="text" placeholder="%" oninput="calcEstimateYear()"></div>
      ${sysData.map(() => '<div class="sys">-</div>').join('')}${ann ? '<div class="sys ann-col">-</div>' : ''}
      <div class="lbl">累計營收（仟元）</div>
      <div class="val"><div class="computed" id="estCumRevK">-</div></div>
      <div class="val"><div class="computed" id="estCumRevKYear">-</div></div>
      ${sysCells('cumRevK', null)}
      <div class="lbl">累計營收（百萬）</div>
      <div class="val"><div class="computed" id="estCumRevM">-</div></div>
      <div class="val"><div class="computed" id="estCumRevMYear">-</div></div>
      ${sysCells('cumRevM', null)}

      <div class="sep"></div>

      <div class="lbl">營業成本（百萬）</div>
      <div class="val"><div class="computed" id="estCOGS">-</div></div>
      <div class="val"><div class="computed" id="estCOGSYear">-</div></div>
      ${sysCells('cogs', null)}
      <div class="lbl">毛利（百萬）</div>
      <div class="val"><div class="computed" id="estGP">-</div></div>
      <div class="val"><div class="computed" id="estGPYear">-</div></div>
      ${sysCells('gp', null)}
      <div class="lbl">毛利率（%）</div>
      <div class="val"><input id="estGM" type="text" placeholder="%" oninput="calcEstimate()"></div>
      <div class="val"><input id="estGMYear" type="text" placeholder="%" oninput="calcEstimateYear()"></div>
      ${sysCells('gm', null)}
      <div class="lbl">費用（百萬）</div>
      <div class="val"><input id="estOpex" type="text" placeholder="營業費用" oninput="calcEstimate()"></div>
      <div class="val"><input id="estOpexYear" type="text" placeholder="營業費用" oninput="calcEstimateYear()"></div>
      ${sysCells('opex', null)}
      <div class="lbl">業外（百萬）</div>
      <div class="val"><input id="estNonOp" type="text" placeholder="業外收支" oninput="calcEstimate()"></div>
      <div class="val"><input id="estNonOpYear" type="text" placeholder="業外收支" oninput="calcEstimateYear()"></div>
      ${sysCells('nonop', null)}
      <div class="lbl">稅率（%）</div>
      <div class="val"><input id="estTax" type="text" placeholder="%" oninput="calcEstimate()"></div>
      <div class="val"><input id="estTaxYear" type="text" placeholder="%" oninput="calcEstimateYear()"></div>
      ${sysCells('tax', null)}
      <div class="lbl">歸屬權重（%）</div>
      <div class="val"><input id="estPW" type="text" placeholder="%" oninput="calcEstimate()"></div>
      <div class="val"><input id="estPWYear" type="text" placeholder="%" oninput="calcEstimateYear()"></div>
      ${sysCells('pw', null)}

      <div class="val"><div class="computed result-val" id="estOI">-</div></div>
      <div class="val"><div class="computed result-val" id="estOIYear">-</div></div>
      ${sysCells('oi', null)}
      <div class="lbl result-label">營益率（%）</div>
      <div class="val"><div class="computed result-val" id="estOIR">-</div></div>
      <div class="val"><div class="computed result-val" id="estOIRYear">-</div></div>

      <div class="val"><div class="computed result-val" id="estPTIYear">-</div></div>
      ${sysCells('pti', null)}

      <div class="val"><div class="computed result-val" id="estPTIRYear">-</div></div>

      <div class="lbl result-label">稅（百萬）</div>

      <div class="val"><div class="computed result-val" id="estTaxAmtYear">-</div></div>
      ${sysCells('taxAmt', null)}
      <div class="lbl result-label">稅後淨利率（%）</div>
      <div class="val"><div class="computed result-val" id="estNIR">-</div></div>
      <div class="val"><div class="computed result-val" id="estNIRYear">-</div></div>

      <div class="val"><div class="computed result-val" id="estNIPYear">-</div></div>

      ${sysData.map(s => {
        const color = s.eps >= 0 ? '#059669' : '#dc2626';
        let extra = '';
        if (s.has_actual && s.actual_eps != null) {
          const diff = s.eps - s.actual_eps;
          extra = `<div style="font-size:.72rem;color:#64748b">實際 ${s.actual_eps.toFixed(2)} | 差 ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}</div>`;
        } else if (s.yoy_eps != null) {
          extra = `<div style="font-size:.72rem;color:#64748b">去年 ${s.yoy_eps.toFixed(2)}</div>`;
        }
        return `<div class="sys" style="flex-direction:column;align-items:flex-start"><div style="font-size:1.05rem;font-weight:800;color:${color}">${s.epsStr}</div>${extra}</div>`;
      }).join('')}${ann ? (() => {
        const color = ann.eps >= 0 ? '#0369a1' : '#dc2626';
        let extra = '';
        if (ann.lastEps != null) extra = `<div style="font-size:.72rem;color:#64748b">去年 ${ann.lastEps.toFixed(2)}</div>`;
        extra += `<div style="font-size:.68rem;color:#94a3b8">${ann.nMonths}月資料</div>`;
        return `<div class="sys ann-col" style="flex-direction:column;align-items:flex-start"><div style="font-size:1.05rem;font-weight:800;color:${color}">${ann.epsStr}</div>${extra}</div>`;
      })() : ''}

      <div class="lbl result-label">估計 EPS-本業</div>
      <div class="val"><div class="computed result-val" id="estEPScore">-</div></div>
      <div class="val"><div class="computed result-val" id="estEPScoreYear">-</div></div>
      ${sysCells('epsCore', null)}
      <div class="lbl result-label">估計 EPS-業外</div>
      <div class="val"><div class="computed result-val" id="estEPSnonop">-</div></div>
      <div class="val"><div class="computed result-val" id="estEPSnonopYear">-</div></div>
      ${sysCells('epsNonop', null)}
    </div>
    ${(() => {
      const notes = [];
      sysData.forEach(s => {
        const parts = [];
        if (s.rev_estimated > 0) parts.push(`${s.quarter}：實際 ${s.rev_actual} 月 / 預估 ${s.rev_estimated} 月`);
        if (s.issues.length) parts.push(s.issues.join('、'));
        if (parts.length) notes.push(parts.join('；'));
      });
      if (ann && ann.issues.length) notes.push(`${ann.target}：${ann.issues.join('、')}`);
      return notes.length ? `<div style="margin-top:8px;font-size:.78rem;color:#94a3b8">${notes.join(' | ')}<span style="margin-left:8px">* 為預估營收</span></div>` : '';
    })()}

    <!-- 年度 EPS 彙總 -->
    <div class="est-annual">
      <div class="est-annual-title" style="display:flex;align-items:center;gap:12px">
        <span>${_estYear} 年度預估 EPS</span>
        <button class="est-save" onclick="saveValParams()">儲存參數</button>
        <button class="est-save" onclick="clearValParams()" style="background:#ef4444">清除參數</button>
        <span class="est-date" id="valParamsDate" style="font-size:.78rem;color:#94a3b8"></span>
      </div>
      <div class="est-q-row">
        <div class="est-q-item"><label>${_estYear}Q1</label><input id="estQ1" type="text" oninput="calcAnnual()"></div>
        <div class="est-q-item"><label>${_estYear}Q2</label><input id="estQ2" type="text" oninput="calcAnnual()"></div>
        <div class="est-q-item"><label>${_estYear}Q3</label><input id="estQ3" type="text" oninput="calcAnnual()"></div>
        <div class="est-q-item"><label>${_estYear}Q4</label><input id="estQ4" type="text" oninput="calcAnnual()"></div>
        <div class="est-annual-eps">${_estYear} 預估 EPS = <span id="annEPS">-</span></div>
        ${ann ? `<div class="est-annual-eps" style="background:#e0f2fe;color:#0369a1">系統 = <span style="font-weight:800">${ann.epsStr}</span></div>` : ''}
      </div>

      <div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap">
        <div class="est-val-grid" style="min-width:420px;flex-shrink:0">
          <div class="lbl">配息率（%）</div>
          <div class="val"><input id="annPR" type="text" placeholder="%" oninput="calcFromPR()"></div>
          <div class="sys-v">${ann && ann.payout != null ? ann.payout + '%' : '-'}</div>

          <div class="val"><input id="annDiv" type="text" placeholder="元" oninput="calcFromDiv()"></div>
          <div class="sys-v" style="font-weight:700">${ann && ann.div != null ? ann.div.toFixed(2) : '-'}</div>

          <div class="sep"></div>

          <div class="lbl" style="font-weight:600;color:#334155">目前股價</div>
          <div class="val"><div class="est-price-box" id="annPrice">-</div></div>
          <div class="sys-v"></div>
          <div class="lbl" style="font-weight:600;color:#334155">預估本益比</div>
          <div class="val"><div class="computed" id="annPE" style="font-weight:700;font-size:.95rem">-</div></div>
          <div class="sys-v">${ann && ann.pe != null ? ann.pe.toFixed(2) : '-'}</div>
          <div class="lbl" style="font-weight:600;color:#334155">預估殖利率</div>
          <div class="val"><div class="computed" id="annYield" style="font-weight:700;color:#059669;font-size:.95rem">-</div></div>
          <div class="sys-v" style="color:#059669">${ann && ann.yld != null ? ann.yld + '%' : '-'}</div>
        </div>
        <div style="flex:1;min-width:300px">
          ${(() => {
            const payouts = (typeof annuals !== 'undefined' ? annuals : _annualPayouts).slice(0, 5);
            if (!payouts.length) return '';
            let t = '<div style="font-size:.88rem;font-weight:700;color:#1e3a5f;margin-bottom:4px">配息率歷史（近 ' + payouts.length + ' 年）</div>';
            t += '<table class="pe-hist-table"><thead><tr><th style="width:80px">年度</th>';
            payouts.forEach(a => { t += '<th>' + a.year_label + '</th>'; });
            t += '</tr></thead><tbody>';
            t += '<tr><td style="font-weight:600;color:#475569">EPS</td>';
            payouts.forEach(a => { t += '<td>' + (a.eps != null ? a.eps.toFixed(2) : '-') + '</td>'; });
            t += '</tr><tr><td style="font-weight:600;color:#475569">現金股利</td>';
            payouts.forEach(a => { t += '<td>' + (a.cash_dividend != null ? a.cash_dividend.toFixed(2) : '-') + '</td>'; });
            t += '</tr><tr><td style="font-weight:600;color:#475569">配息率</td>';
            payouts.forEach(a => { t += '<td style="font-weight:700;color:#2563eb">' + (a.payout_ratio != null ? Math.round(a.payout_ratio) + '%' : '-') + '</td>'; });
            t += '</tr></tbody></table>';
            return t;
          })()}
        </div>
      </div>

      <!-- 本益比設定 + 歷史參考（左右並排） -->
      <div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;margin-top:16px;border-top:1px solid #e2e8f0;padding-top:16px">
        <div class="est-val-grid" style="min-width:420px;flex-shrink:0">
          <div class="lbl">最高本益比</div>
          <div class="val"><input id="peHigh" type="text" placeholder="倍" oninput="calcPERange()"></div>
          <div class="sys-v">18</div>

          <div class="sep"></div>
          <div class="lbl result-label">偏高本益比</div>
          <div class="val"><div class="computed result-val" id="peAbove">-</div></div>

          <div class="lbl result-label">合理本益比</div>
          <div class="val"><div class="computed result-val" id="peFair" style="color:#2563eb">-</div></div>

          <div class="lbl result-label">偏低本益比</div>

        </div>
        <div id="peHistoryContainer" style="flex:1;min-width:300px"><div class="loading" style="padding:12px"><div class="spinner"></div></div></div>
      </div>

      <div class="est-val-grid" style="margin-top:16px;border-top:1px solid #e2e8f0;padding-top:16px">
        <div class="lbl">偏高殖利率（%）</div>
        <div class="val"><input id="yldHigh" type="text" placeholder="%" oninput="calcYldRange()"></div>

        <div class="lbl">最高殖利率（%）</div>

        <div class="sys-v">6%</div>
        <div class="sep"></div>
        <div class="lbl result-label">合理殖利率</div>

// 計算沈董EPS（與 index.html calcDerived 一致）
function _calcShenEps(stock) {
  if (!stock) return null;
  const curRoc = new Date().getFullYear() - 1911;
  const allEps = [];
  for (let i = 1; i <= 5; i++) {
    const q = stock[`eps_${i}q`], v = stock[`eps_${i}`];
    if (q != null && v != null) allEps.push({ q, v });
  }
  const curYear = allEps.filter(e => parseInt(e.q.split('Q')[0]) === curRoc);
  const n = curYear.length;
  if (n >= 4) return Math.round(curYear.reduce((a, e) => a + e.v, 0) * 100) / 100;
  if (n > 0) return Math.round(curYear.reduce((a, e) => a + e.v, 0) / n * 4 * 100) / 100;
  // fallback: 近四季
  const eps4 = [1,2,3,4].map(i => stock[`eps_${i}`]).filter(v => v != null);
  if (eps4.length === 4) return Math.round(eps4.reduce((a,v) => a+v, 0) * 100) / 100;
  return stock.eps_y1 || stock.eps_ytd || null;
}

// 計算綜合股利（與總表 calcDerived 一致：沈董股利 × A% + 加權股利 × B%）
function _calcBlendDiv(stock, shenEps) {
  if (!stock) return null;
  const DEFAULT_WEIGHTS = [30, 30, 20, 10, 10];
  const ws = JSON.parse(localStorage.getItem('global_div_weights') || 'null') || DEFAULT_WEIGHTS;
  const blendRatio = JSON.parse(localStorage.getItem('blend_ratio') || 'null') || { shen: 50, wt: 50 };
  const blendShen = blendRatio.shen || 50;
  const blendWt = blendRatio.wt || 50;
  const bS = blendShen / 100, bW = blendWt / 100;

  // 加權股利（5年加權）
  let wdiv = 0, wsum = 0;
  for (let i = 1; i <= 5; i++) {
    const cd = stock[`div_c${i}`] || 0;
    const sd = stock[`div_s${i}`] || 0;
    const w = ws[i - 1] || 0;
    if ((cd + sd) > 0 && w > 0) { wdiv += (cd + sd) * w / 100; wsum += w; }
  }
  const weightedDiv = wsum > 0 ? Math.round(wdiv * 100) / 100 : null;

  // 加權配息率
  let wpSum = 0, wpW = 0;
  for (let i = 1; i <= 5; i++) {
    const p = stock[`payout_${i}`];
    const w = ws[i - 1] || 0;
    if (p != null && w > 0) { wpSum += p * w / 100; wpW += w; }
  }
  const weightedPayout = wpW > 0 ? Math.round(wpSum * 100) / 100 : null;

  // 沈董股利
  let shenDiv = null;
  if (shenEps != null && shenEps > 0) {
    // 判斷是否 fallback（當年度無季報）
    const curRoc = new Date().getFullYear() - 1911;
    const hasCurYear = [1,2,3,4,5].some(i => {
      const q = stock[`eps_${i}q`];
      return q && parseInt(q.split('Q')[0]) === curRoc;
    });
    if (!hasCurYear) {
      // fallback：優先取最新年度實際股利
      const divLabel = stock.eps_y1_label;
      for (let i = 1; i <= 5; i++) {
        if (stock[`div_${i}_label`] == divLabel) {
          const cd = stock[`div_c${i}`] || 0;
          const sd = stock[`div_s${i}`] || 0;
          if (cd + sd > 0) shenDiv = Math.round((cd + sd) * 100) / 100;
          break;
        }
      }
    }
    if (shenDiv == null && weightedPayout != null) {
      shenDiv = Math.round(shenEps * weightedPayout * 100) / 100;
    }
  }

  // 綜合股利 = 沈董股利 × A% + 加權股利 × B%
  if (bS + bW > 0) {
    if (shenDiv != null && weightedDiv != null) return Math.round((shenDiv * bS + weightedDiv * bW) * 100) / 100;
    if (shenDiv != null) return Math.round(shenDiv * 100) / 100;
    if (weightedDiv != null) return Math.round(weightedDiv * 100) / 100;
  }

  // fallback
  if (stock.sys_ann_div) return stock.sys_ann_div;
  return null;
}

async function initEstimator(sharesMillion) {
  _estSharesMillion = sharesMillion;

  let _stockData = null;

  // 取得目前股價
  try {
    const res = await fetch(`/api/stocks?exact=${CODE}`);
    const json = await res.json();
    const stock = json.data.find(s => s.code === CODE);
    if (stock && stock.close) {
      _estPrice = stock.close;
      const el = document.getElementById('annPrice');
      if (el) el.textContent = _estPrice.toFixed(2);
    }
    _stockData = stock;
  } catch(e) {}

  // 預設值（每次載入都用最新資料重算）
  let _shenEps = null, _shenDiv = null, _blendDiv = null;
  if (_stockData) {
    const savedObj = (() => { try { return JSON.parse(localStorage.getItem('estimate_' + CODE) || '{}'); } catch(e) { return {}; } })();
    const userEps = savedObj.vmEps ? parseFloat(savedObj.vmEps) : null;
    const sysEps = _stockData.sys_ann_eps || null;
    _shenEps = _calcShenEps(_stockData);
    _blendDiv = _calcBlendDiv(_stockData, _shenEps);

    // 沈董股利
    if (_shenEps != null && _shenEps > 0) {
      const DEFAULT_WEIGHTS = [30, 30, 20, 10, 10];
      const ws = JSON.parse(localStorage.getItem('global_div_weights') || 'null') || DEFAULT_WEIGHTS;
      // 自行計算加權配息率（用同年度 EPS 和股利配對）
      // 建立 {label: eps} 和 {label: div} 對照表
      const epsMap = {}, divMap = {};
      for (let i = 1; i <= 6; i++) {
        const el = _stockData[`eps_y${i}_label`], ev = _stockData[`eps_y${i}`];
        if (el != null && ev != null) epsMap[String(el)] = ev;
        const dl = _stockData[`div_${i}_label`], dc = _stockData[`div_c${i}`] || 0, ds = _stockData[`div_s${i}`] || 0;
        if (dl != null && (dc + ds) > 0) divMap[String(dl)] = dc + ds;
      }
      // 按年度配對算配息率，用最近5年加權
      const payoutPairs = [];
      const sortedYears = Object.keys(epsMap).sort((a, b) => parseInt(b) - parseInt(a));
      for (const yr of sortedYears) {
        if (divMap[yr] && epsMap[yr] > 0) {
          payoutPairs.push(Math.min(divMap[yr] / epsMap[yr], 1.0));
        }
        if (payoutPairs.length >= 5) break;
      }
      let wpSum = 0, wpW = 0;
      for (let i = 0; i < payoutPairs.length; i++) {
        const w = ws[i] || 0;
        if (w > 0) { wpSum += payoutPairs[i] * w; wpW += w; }
      }
      const weightedPayout = wpW > 0 ? wpSum / wpW : null;  // 0~1 的小數

      const curRoc = new Date().getFullYear() - 1911;
      const hasCurYear = [1,2,3,4,5].some(i => {
        const q = _stockData[`eps_${i}q`];
        return q && parseInt(q.split('Q')[0]) === curRoc;
      });
      if (!hasCurYear) {
        const divLabel = _stockData.eps_y1_label;
        for (let i = 1; i <= 6; i++) {
          if (_stockData[`div_${i}_label`] == divLabel) {
            const cd = _stockData[`div_c${i}`] || 0;
            const sd = _stockData[`div_s${i}`] || 0;
            if (cd + sd > 0) _shenDiv = Math.round((cd + sd) * 100) / 100;
            break;
          }
        }
      }
      if (_shenDiv == null && weightedPayout != null) {
        _shenDiv = Math.round(_shenEps * weightedPayout * 100) / 100;
      }
      // fallback：最近有值的現金股利
      if (_shenDiv == null) {
        for (let i = 1; i <= 6; i++) {
          const cd = _stockData[`div_c${i}`];
          if (cd != null && cd > 0) { _shenDiv = cd; break; }
        }
      }
    }

    // === DDM 預設值 ===
    // 三年後預估EPS：自行預估EPS(vmEps) > min(系統EPS, 沈董EPS)
    let ddmEps = null;
    if (userEps && !isNaN(userEps) && userEps > 0) {
      ddmEps = userEps;
    } else if (sysEps != null && _shenEps != null) {
      ddmEps = Math.min(sysEps, _shenEps);
    } else {
      ddmEps = sysEps || _shenEps;
    }
    if (ddmEps != null) document.getElementById('ddmEps').value = ddmEps.toFixed(2);

    // DDM 現金股利 = 綜合股利
    if (_blendDiv != null) {
      document.getElementById('ddmDiv1').value = _blendDiv.toFixed(2);
      document.getElementById('ddmDiv2').value = _blendDiv.toFixed(2);
      document.getElementById('ddmDiv3').value = _blendDiv.toFixed(2);
    }

    // === 逍遙評價法預設值（預估 > 沈董，與總表評價一致）===
    let _vmEpsSrc = '', _vmDivSrc = '', _vmLtDivSrc = '';
    if (!savedObj.vmEps) {
      const userEstEps = savedObj.q1 || savedObj.q2 || savedObj.q3 || savedObj.q4
        ? [savedObj.q1, savedObj.q2, savedObj.q3, savedObj.q4].filter(v => v).reduce((a, b) => parseFloat(a || 0) + parseFloat(b || 0), 0)
        : null;
      const autoEps = userEstEps || _shenEps;
      if (autoEps != null) document.getElementById('vmEps').value = parseFloat(autoEps).toFixed(2);
      _vmEpsSrc = userEstEps ? '預估EPS（Q1~Q4加總）' : (_shenEps ? '沈董EPS' : '無資料');
    } else {
      _vmEpsSrc = '手動設定';
    }
    if (!savedObj.vmDiv) {
      const userEstDiv = savedObj.div ? parseFloat(savedObj.div) : null;
      const autoDiv = userEstDiv || _shenDiv;
      if (autoDiv != null) document.getElementById('vmDiv').value = parseFloat(autoDiv).toFixed(2);
      _vmDivSrc = userEstDiv ? '預估股利' : (_shenDiv ? '沈董股利' : '無資料');
    } else {
      _vmDivSrc = '手動設定';
    }
    if (!savedObj.vmLtDiv && _blendDiv != null) {
      document.getElementById('vmLtDiv').value = _blendDiv.toFixed(2);
      _vmLtDivSrc = '綜合股利（沈董×60%+加權×40%）';
    } else if (savedObj.vmLtDiv) {
      _vmLtDivSrc = '手動設定';
    } else {
      _vmLtDivSrc = '無資料';
    }
    // 顯示來源註記
    const vmNote = document.getElementById('vmSourceNote');
    if (vmNote) {
      vmNote.innerHTML = `EPS設定來源：${_vmEpsSrc}　|　股利設定來源：${_vmDivSrc}　|　長期現金股利水準來源：${_vmLtDivSrc}`;
    }

    // DDM 來源註記
    let _ddmEpsSrc = '', _ddmDivSrc = '';
    if (userEps && !isNaN(userEps) && userEps > 0) {
      _ddmEpsSrc = '手動設定';
    } else if (sysEps != null && _shenEps != null) {
      _ddmEpsSrc = `min(系統${sysEps}, 沈董${_shenEps})`;
    } else if (sysEps) {
      _ddmEpsSrc = '系統EPS';
    } else if (_shenEps) {
      _ddmEpsSrc = '沈董EPS';
    } else {
      _ddmEpsSrc = '無資料';
    }
    _ddmDivSrc = _blendDiv != null ? '綜合股利' : '無資料';
    const ddmNote = document.getElementById('ddmSourceNote');
    if (ddmNote) {
      ddmNote.innerHTML = `三年後預估EPS來源：${_ddmEpsSrc}　|　現金股利來源：${_ddmDivSrc}`;
    }
  }

  // 從 DB 載入（跨瀏覽器同步），合併到 localStorage
  fetch(`/api/user-estimates/${CODE}`).then(r => r.json()).then(dbData => {
    if (dbData && Object.keys(dbData).length > 0) {
      let local = {};
      try { local = JSON.parse(localStorage.getItem('estimate_' + CODE) || '{}'); } catch(e) {}
      // DB 資料覆蓋 localStorage（DB 為準）
      Object.assign(local, dbData);
      localStorage.setItem('estimate_' + CODE, JSON.stringify(local));
      _applyEstimateData(local);
    }
  }).catch(() => {});

  // 從 localStorage 載入（立即顯示，不等 DB）
  const saved = localStorage.getItem('estimate_' + CODE);
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (d.rev1) document.getElementById('estRev1').value = d.rev1;
      if (d.rev2) document.getElementById('estRev2').value = d.rev2;
      if (d.rev3) document.getElementById('estRev3').value = d.rev3;
      if (d.gm) document.getElementById('estGM').value = d.gm;
      if (d.opex) document.getElementById('estOpex').value = d.opex;
      if (d.nonop) document.getElementById('estNonOp').value = d.nonop;
      if (d.tax) document.getElementById('estTax').value = d.tax;
      if (d.pw) document.getElementById('estPW').value = d.pw;
      if (d.revYear) document.getElementById('estRevYear').value = d.revYear;
      if (d.growthRate) document.getElementById('estGrowthRate').value = d.growthRate;
      if (d.gmYear) document.getElementById('estGMYear').value = d.gmYear;
      if (d.opexYear) document.getElementById('estOpexYear').value = d.opexYear;
      if (d.nonopYear) document.getElementById('estNonOpYear').value = d.nonopYear;
      if (d.taxYear) document.getElementById('estTaxYear').value = d.taxYear;
      if (d.pwYear) document.getElementById('estPWYear').value = d.pwYear;
      if (d.q1) document.getElementById('estQ1').value = d.q1;
      if (d.q2) document.getElementById('estQ2').value = d.q2;
      if (d.q3) document.getElementById('estQ3').value = d.q3;
      if (d.q4) document.getElementById('estQ4').value = d.q4;
      if (d.pr) document.getElementById('annPR').value = d.pr;
      if (d.div) document.getElementById('annDiv').value = d.div;
      if (d.peHigh) document.getElementById('peHigh').value = d.peHigh;
      if (d.peLow) document.getElementById('peLow').value = d.peLow;
      if (d.yldHigh) document.getElementById('yldHigh').value = d.yldHigh;
      if (d.yldMax) document.getElementById('yldMax').value = d.yldMax;
      if (d.vmEps) document.getElementById('vmEps').value = d.vmEps;
      if (d.vmDiv) document.getElementById('vmDiv').value = d.vmDiv;
      if (d.vmLtDiv) document.getElementById('vmLtDiv').value = d.vmLtDiv;
      // DDM：EPS 和股利每次從最新資料重算，只還原使用者調過的 PE/折現率/安全邊際
      if (d.ddmPE) document.getElementById('ddmPE').value = d.ddmPE;
      if (d.ddmRate) document.getElementById('ddmRate').value = d.ddmRate;
      if (d.ddmMargin) document.getElementById('ddmMargin').value = d.ddmMargin;
      if (d.date) document.getElementById('estDate').textContent = '上次儲存：' + d.date;
      if (d.valParamsDate) document.getElementById('valParamsDate').textContent = '上次儲存：' + d.valParamsDate;
      calcEstimate();
      calcEstimateYear();
      calcAnnual();
      calcPERange();
      calcYldRange();
      calcValMethod();
      loadPEHistory();
    } catch(e) {}
  }
  loadPEHistory();
  calcValMethod();
  calcDDM();
  renderMatrix();

  // 載入筆記（先 localStorage，再從 DB 覆蓋）
  const savedNotes = localStorage.getItem('notes_' + CODE);
  if (savedNotes) {
    const notesArea = document.getElementById('notesArea');
    if (notesArea) notesArea.value = savedNotes;
  }
  // 從 DB 載入筆記（跨瀏覽器同步）
  fetch(`/api/user-notes/${CODE}`).then(r => r.json()).then(data => {
    if (data && data.content) {
      const notesArea = document.getElementById('notesArea');
      if (notesArea) {
        notesArea.value = data.content;
        localStorage.setItem('notes_' + CODE, data.content);
      }
    }
  }).catch(() => {});
}
