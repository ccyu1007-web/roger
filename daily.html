<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日新聞報告</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; overscroll-behavior-x: none; }
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .88rem; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .section { background: #fff; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.08); overflow: hidden; }
  .section-header { padding: 14px 20px; font-weight: 700; font-size: .95rem; display: flex; align-items: center; gap: 8px; }
  .section-body { padding: 0 20px 16px; }
  .yellow-header { background: #fffbeb; color: #92400e; border-bottom: 2px solid #fcd34d; }
  .gray-header { background: #f8fafc; color: #475569; border-bottom: 2px solid #e2e8f0; }
  .stock-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid #f1f5f9; flex-wrap: wrap;
  }
  .stock-row:last-child { border-bottom: none; }
  .stock-code { font-weight: 700; color: #2563eb; text-decoration: none; min-width: 50px; }
  .stock-code:hover { text-decoration: underline; }
  .stock-name { color: #334155; min-width: 80px; }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: .78rem; font-weight: 700; }
  .metric { font-size: .84rem; color: #64748b; }
  .date-label { font-size: .82rem; color: rgba(255,255,255,.7); }
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
  .tab-btn {
    padding: 10px 20px; font-size: .9rem; font-weight: 600; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #64748b;
    transition: all .15s;
  }
  .tab-btn:first-child { border-radius: 8px 0 0 8px; }
  .tab-btn:last-child { border-radius: 0 8px 8px 0; }
  .tab-btn.active { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .count-badge { font-size: .75rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>每日新聞報告</h1>
    <span class="date-label" id="dateLabel"></span>
  </div>
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <input type="text" id="newsSearch" placeholder="搜尋股票代碼、名稱或關鍵字..." oninput="filterNews()" style="flex:1;min-width:200px;padding:8px 12px;border:1px solid rgba(255,255,255,.3);border-radius:6px;font-size:.85rem;background:rgba(255,255,255,.15);color:#fff">
    <a href="/">回總表</a>
    <a href="/valuation.html">評價報告</a>
    <a href="/etf_changes.html">ETF專區</a>
    <a href="/health.html">系統監控</a>
  </div>
</header>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('today',this)">今日<span class="count-badge" id="todayCount" style="background:#fef3c7;color:#92400e"></span></button>
    <button class="tab-btn" onclick="switchTab('history',this)">歷史<span class="count-badge" id="histCount" style="background:#f1f5f9;color:#64748b"></span></button>
    <button class="tab-btn" onclick="switchTab('filtered',this)">被過濾<span class="count-badge" id="filteredCount" style="background:#f1f5f9;color:#94a3b8"></span></button>
  </div>
  <div id="content">
    <div style="text-align:center;padding:60px;color:#94a3b8">載入中...</div>
  </div>
</div>

<script>
const _USER_HEADERS = {'Content-Type':'application/json', 'X-API-Key':'roger-stock-2026'};
let _news = [];
let _currentTab = 'today';

async function load() {
  try {
    const [briefRes, newsRes] = await Promise.all([
      fetch('/api/daily-briefing'),
      fetch('/api/news?tier=0&limit=500'),
    ]);
    const d = await briefRes.json();
    _news = await newsRes.json();
    if (d.data_date) {
      document.getElementById('dateLabel').textContent = `資料日期：${d.data_date}`;
    }
    updateCounts();
    renderTab();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div style="text-align:center;padding:60px;color:#ef4444">無法載入，請確認系統已啟動</div>';
  }
}

const todayMMDD = (new Date().getMonth()+1).toString().padStart(2,'0') + '/' + new Date().getDate().toString().padStart(2,'0');
const todayISO = new Date().toISOString().slice(0,10);
const isToday = n => (n.date || '').includes(todayMMDD) || (n.created_at || '').startsWith(todayISO);

function updateCounts() {
  const t2today = _news.filter(n => n.tier >= 1 && isToday(n) && !n.cooled);
  const t2hist = _news.filter(n => n.tier >= 1 && !isToday(n) && !n.cooled);
  const t0 = _news.filter(n => n.tier === 0);
  const t2tPending = t2today.filter(n => !n.status).length;
  const t2hPending = t2hist.filter(n => !n.status).length;
  const t0Pending = t0.filter(n => !n.status).length;
  document.getElementById('todayCount').textContent = t2tPending || '';
  document.getElementById('histCount').textContent = t2hPending || '';
  document.getElementById('filteredCount').textContent = t0Pending || '';
}

function switchTab(tab, btn) {
  _currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTab();
}

function renderTab() {
  if (_currentTab === 'today') renderToday();
  else if (_currentTab === 'history') renderHistory();
  else renderFiltered();
}

function renderToday() {
  const items = _news.filter(n => n.tier >= 1 && isToday(n) && !n.cooled);
  const tier2 = items.filter(n => n.tier === 2);
  const tier1 = items.filter(n => n.tier === 1);
  const cooled = _news.filter(n => n.tier === 2 && isToday(n) && n.cooled);

  let html = '';

  // 重大訊息 (Tier 2)
  if (tier2.length) {
    const pending = tier2.filter(n => !n.status);
    const done = tier2.filter(n => n.status);
    html += renderSection('今日重大訊息', 'yellow-header', pending, done, true);
  }

  // 一般訊息 (Tier 1)
  if (tier1.length) {
    const pending = tier1.filter(n => !n.status);
    const done = tier1.filter(n => n.status);
    html += renderSection('今日一般訊息', 'gray-header', pending, done, false);
  }

  // 冷卻中
  if (cooled.length) {
    html += `<div class="section"><div class="section-body" style="padding-top:12px">
      <details><summary style="cursor:pointer;font-size:.82rem;color:#94a3b8">同公司重複訊息（${cooled.length} 則）</summary>
      <div style="margin-top:6px">`;
    cooled.forEach(n => html += newsRow(n, '#f8fafc', '#94a3b8'));
    html += '</div></details></div></div>';
  }

  if (!html) html = '<div style="text-align:center;padding:60px;color:#94a3b8">今日暫無新聞</div>';
  document.getElementById('content').innerHTML = html;
}

function renderHistory() {
  const items = _news.filter(n => n.tier >= 1 && !isToday(n) && !n.cooled);
  const tier2 = items.filter(n => n.tier === 2);
  const tier1 = items.filter(n => n.tier === 1);

  let html = '';

  if (tier2.length) {
    const pending = tier2.filter(n => !n.status);
    const done = tier2.filter(n => n.status);
    html += renderSection('歷史重大訊息', 'yellow-header', pending, done, true);
  }

  if (tier1.length) {
    const pending = tier1.filter(n => !n.status);
    const done = tier1.filter(n => n.status);
    html += renderSection('歷史一般訊息', 'gray-header', pending, done, false);
  }

  if (!html) html = '<div style="text-align:center;padding:60px;color:#94a3b8">暫無歷史新聞</div>';
  document.getElementById('content').innerHTML = html;
}

function renderFiltered() {
  const items = _news.filter(n => n.tier === 0);
  const pending = items.filter(n => !n.status);
  const done = items.filter(n => n.status);

  let html = '';
  if (pending.length) {
    html += '<div class="section"><div class="section-header" style="background:#f8fafc;color:#94a3b8;border-bottom:1px solid #e2e8f0">被過濾訊息（覺得重要可按「升級」）</div><div class="section-body">';
    pending.forEach(n => html += renderT0Row(n));
    html += '</div></div>';
  }
  if (done.length) {
    html += `<div class="section"><div class="section-body" style="padding-top:12px">
      <details><summary style="cursor:pointer;font-size:.82rem;color:#94a3b8">已處理（${done.length} 則）</summary>
      <div style="margin-top:6px;opacity:.5">`;
    done.forEach(n => html += renderT0Row(n));
    html += '</div></details></div></div>';
  }

  if (!html) html = '<div style="text-align:center;padding:60px;color:#94a3b8">暫無被過濾訊息</div>';
  document.getElementById('content').innerHTML = html;
}

function renderSection(title, headerClass, pending, done, isTier2) {
  const total = pending.length + done.length;
  let html = `<div class="section">
    <div class="section-header ${headerClass}">${title}
      <span style="font-weight:400;font-size:.82rem;margin-left:4px">（未處理 ${pending.length} / 已處理 ${done.length}）</span>
    </div><div class="section-body">`;

  if (isTier2) {
    html += renderT2Group(pending);
  } else {
    pending.forEach(n => html += renderT1Row(n));
  }

  if (done.length) {
    html += `<details style="margin-top:8px"><summary style="cursor:pointer;font-size:.82rem;color:#94a3b8">已處理（${done.length} 則）</summary>
    <div style="margin-top:4px;opacity:.5">`;
    if (isTier2) {
      html += renderT2Group(done);
    } else {
      done.forEach(n => html += renderT1Row(n, false));
    }
    html += '</div></details>';
  }

  html += '</div></div>';
  return html;
}

function renderT2Group(items) {
  const alarm = items.filter(n => n.direction === 'alarm');
  const neg = items.filter(n => !['positive','alarm'].includes(n.direction));
  const pos = items.filter(n => n.direction === 'positive');
  let h = '';
  if (alarm.length) {
    h += '<div style="margin:10px 0 6px;font-weight:700;color:#7f1d1d;font-size:.95rem">警鈴</div>';
    alarm.forEach(n => h += newsRow(n, '#fecaca', '#7f1d1d'));
  }
  if (neg.length) {
    h += '<div style="margin:10px 0 6px;font-weight:700;color:#991b1b;font-size:.88rem">負向 / 風險</div>';
    neg.forEach(n => h += newsRow(n, '#fee2e2', '#991b1b'));
  }
  if (pos.length) {
    h += '<div style="margin:10px 0 6px;font-weight:700;color:#059669;font-size:.88rem">正向催化劑</div>';
    pos.forEach(n => h += newsRow(n, '#dcfce7', '#166534'));
  }
  return h;
}

function newsRow(n, bg, color) {
  const linkHtml = n.link ? `<a href="${n.link}" target="_blank" style="font-size:.76rem;color:#2563eb;text-decoration:none;white-space:nowrap">查看</a>` : '';
  const buttons = actionButtons(n);
  return `<div class="stock-row" style="background:${bg};border-radius:6px;padding:8px 12px;margin:4px 0">
    <a class="stock-code" href="/company.html?code=${n.code}" target="_blank">${n.code}</a>
    <span class="stock-name">${n.name}</span>
    <span class="tag" style="background:${color};color:#fff">${n.matched_rule}</span>
    <span class="metric" style="flex:1;font-size:.82rem">${(n.subject||'').replace(/\r?\n/g,' ').substring(0, 80)}</span>
    ${linkHtml}
    <span class="metric" style="font-size:.76rem;color:#94a3b8">${n.date}</span>
    ${buttons}
  </div>`;
}

function renderT1Row(n, showButtons) {
  if (typeof showButtons === 'undefined') showButtons = true;
  const lnk = n.link ? `<a href="${n.link}" target="_blank" style="font-size:.74rem;color:#2563eb;text-decoration:none">查看</a>` : '';
  const buttons = showButtons ? actionButtons(n) : statusLabel(n);
  return `<div class="stock-row" style="padding:6px 0">
    <a class="stock-code" href="/company.html?code=${n.code}" target="_blank" style="font-size:.82rem">${n.code}</a>
    <span class="stock-name" style="font-size:.82rem">${n.name}</span>
    <span style="font-size:.78rem;color:#94a3b8">${n.matched_rule}</span>
    <span class="metric" style="flex:1;font-size:.8rem">${(n.subject||'').replace(/\r?\n/g,' ').substring(0, 60)}</span>
    ${lnk}
    ${buttons}
  </div>`;
}

function renderT0Row(n) {
  const isDone = n.status === 'dismissed';
  const buttons = isDone ? statusLabel(n) : `
    <button onclick="upgradeNews(${n.id},this)" style="padding:1px 8px;border:1px solid #f59e0b;border-radius:3px;background:#fffbeb;color:#92400e;cursor:pointer;font-size:.7rem">升級</button>
    <button onclick="markNews(${n.id},'dismissed',this)" style="padding:1px 6px;border:1px solid #e2e8f0;border-radius:3px;background:#fff;color:#cbd5e1;cursor:pointer;font-size:.7rem">略</button>`;
  return `<div class="stock-row" style="padding:5px 0;opacity:.7">
    <a class="stock-code" href="/company.html?code=${n.code}" target="_blank" style="font-size:.8rem">${n.code}</a>
    <span class="stock-name" style="font-size:.8rem">${n.name}</span>
    <span style="font-size:.72rem;color:#cbd5e1;background:#f1f5f9;padding:1px 6px;border-radius:3px">${n.matched_rule}</span>
    <span class="metric" style="flex:1;font-size:.78rem">${(n.subject||'').replace(/\r?\n/g,' ').substring(0, 60)}</span>
    ${buttons}
  </div>`;
}

function actionButtons(n) {
  if (n.status) return statusLabel(n) + ` <button onclick="undoNews(${n.id},this)" style="padding:1px 6px;border:1px solid #e2e8f0;border-radius:3px;background:#fff;color:#94a3b8;cursor:pointer;font-size:.68rem">撤銷</button>`;
  return `<button onclick="markNews(${n.id},'important',this)" style="padding:2px 8px;border:1px solid #059669;border-radius:4px;background:#dcfce7;color:#166534;cursor:pointer;font-size:.72rem">重要</button>
    <button onclick="markNews(${n.id},'dismissed',this)" style="padding:2px 8px;border:1px solid #94a3b8;border-radius:4px;background:#f1f5f9;color:#64748b;cursor:pointer;font-size:.72rem">略過</button>`;
}

function statusLabel(n) {
  if (!n.status) return '';
  const label = n.status === 'important' ? '已標重要' : '已略過';
  const bg = n.status === 'important' ? '#dcfce7' : '#f1f5f9';
  const color = n.status === 'important' ? '#059669' : '#94a3b8';
  return `<span style="font-size:.7rem;color:${color};background:${bg};padding:1px 6px;border-radius:3px">${label}</span>`;
}

async function upgradeNews(id, el) {
  await fetch(`/api/news/${id}/upgrade`, {method:'POST', headers: _USER_HEADERS});
  el.closest('.stock-row').style.opacity = '1';
  el.closest('.stock-row').innerHTML = '<span style="color:#059669;font-size:.82rem">已升級到一般訊息</span>';
}

async function markNews(id, status, el) {
  await fetch(`/api/news/${id}/status`, {method:'POST', headers: _USER_HEADERS, body:JSON.stringify({status})});
  // 更新本地資料
  const item = _news.find(n => n.id === id);
  if (item) item.status = status;
  updateCounts();
  renderTab();
}

async function undoNews(id, el) {
  await fetch(`/api/news/${id}/status`, {method:'POST', headers: _USER_HEADERS, body:JSON.stringify({status: null})});
  const item = _news.find(n => n.id === id);
  if (item) item.status = null;
  updateCounts();
  renderTab();
}

function filterNews() {
  const q = document.getElementById('newsSearch').value.toLowerCase().trim();
  document.querySelectorAll('.stock-row').forEach(row => {
    if (!q) { row.style.display = ''; return; }
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

load();
</script>
</body>
</html>
