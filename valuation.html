<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日評價報告</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .88rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
  .date-label { font-size: .82rem; color: rgba(255,255,255,.7); }

  /* 統計卡片 */
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 120px; padding: 16px; border-radius: 10px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stat-card .label { font-size: .78rem; font-weight: 600; margin-bottom: 4px; }
  .stat-card .num { font-size: 1.8rem; font-weight: 800; }
  .stat-card .delta { font-size: .82rem; margin-top: 2px; }
  .sc-aa { background: #fee2e2; color: #dc2626; }
  .sc-a1 { background: #fef3c7; color: #92400e; }
  .sc-a2 { background: #dbeafe; color: #1d4ed8; }
  .sc-a { background: #dcfce7; color: #166534; }

  /* Tab */
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
  .tab-btn {
    padding: 10px 20px; font-size: .9rem; font-weight: 600; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #64748b; transition: all .15s;
  }
  .tab-btn:first-child { border-radius: 8px 0 0 8px; }
  .tab-btn:last-child { border-radius: 0 8px 8px 0; }
  .tab-btn.active { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .count-badge { font-size: .75rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; margin-left: 4px; }

  /* 區塊 */
  .section { background: #fff; border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.08); overflow: hidden; }
  .section-header { padding: 14px 20px; font-weight: 700; font-size: .95rem; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid; }

  /* 表格 */
  table.val-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  table.val-table th { background: #f8fafc; color: #475569; font-size: .78rem; font-weight: 700; padding: 8px 12px; text-align: left; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1; }
  table.val-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
  table.val-table tr:hover { background: #f8fafc; }
  table.val-table tr.dim { opacity: .45; }

  .tag { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: .72rem; font-weight: 700; }
  .tag-aa { background: #fee2e2; color: #dc2626; }
  .tag-a1 { background: #fef3c7; color: #92400e; }
  .tag-a2 { background: #dbeafe; color: #1d4ed8; }
  .tag-a { background: #dcfce7; color: #166534; }
  .tag-new { background: #f0abfc; color: #7e22ce; }
  .tag-recover { background: #e0f2fe; color: #0369a1; }
  .tag-long { background: #f1f5f9; color: #64748b; }
  .grade-a { color: #dc2626; font-weight: 700; }
  .grade-b { color: #d97706; font-weight: 600; }
  .grade-c { color: #94a3b8; }
  .arrow-up { color: #22c55e; }
  .arrow-down { color: #ef4444; }

  .chg-add { background: #dcfce7; color: #166534; font-size: .72rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .chg-rm { background: #fee2e2; color: #991b1b; font-size: .72rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .filter-bar { display: flex; gap: 12px; align-items: center; padding: 0 20px 12px; flex-wrap: wrap; }
  .filter-bar label { font-size: .82rem; color: #64748b; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div>
    <h1>每日評價報告</h1>
    <span class="date-label" id="dateLabel"></span>
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <a href="/">回總表</a>
    <a href="/daily.html">新聞報告</a>
    <a href="/etf_changes.html">ETF專區</a>
  </div>
</header>

<div class="container">
  <!-- Tab -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('aa',this)">AA 超便宜<span class="count-badge" id="cntAA" style="background:#fecaca;color:#dc2626"></span></button>
    <button class="tab-btn" onclick="switchTab('cheap',this)">A1/A2/A 便宜區<span class="count-badge" id="cntCheap" style="background:#fef3c7;color:#92400e"></span></button>
    <button class="tab-btn" onclick="switchTab('changes',this)">今日異動<span class="count-badge" id="cntChanges" style="background:#dbeafe;color:#1d4ed8"></span></button>
  </div>

  <div id="content"><div style="text-align:center;padding:60px;color:#94a3b8">載入中...</div></div>
</div>

<script>
let _data = null;
let _tab = 'aa';
let _hideLoVol = false;

const GRADE_CLS = g => {
  if (!g) return 'grade-c';
  if (['AA','A1','A2','A'].includes(g)) return 'grade-a';
  if (['BA1','BA2','B1','B2'].includes(g)) return 'grade-b';
  return 'grade-c';
};

// 沈董等級矩陣（與 index.html 一致）
function _calcShenGrade(pe, yld) {
  if (pe == null || pe <= 0 || yld == null || yld <= 0) return 'X';
  const peHi=18, peLo=10, yFloor=5, yHigh=5.5, yMax=6;
  const peFair=(peHi+peLo)/2, peAbove=(peHi+peFair)/2, peBelow=(peFair+peLo)/2;
  const peCols=[[-Infinity,peLo],[peLo,peBelow],[peBelow,peFair],[peFair,peAbove],[peAbove,peHi],[peHi,Infinity]];
  const yRows=[[yMax,Infinity],[yHigh,yMax],[yFloor,yHigh],[-Infinity,yFloor]];
  const grades=[['AA','A2','BA2','觀察','臨界點','X'],['A1','A','B2','臨界點','X','X'],['BA1','B1','臨界點','X','X','X'],['觀察','臨界點','X','X','X','X']];
  const col=peCols.findIndex(c=>pe>=c[0]&&pe<c[1]);
  const row=yRows.findIndex(y=>yld>=y[0]&&yld<y[1]);
  return (col>=0&&row>=0)?grades[row][col]:null;
}

let _stocks = []; // 所有股票（含沈董等級、val_aa、股價）

async function load() {
  try {
    const [briefRes, stocksRes] = await Promise.all([
      fetch('/api/daily-briefing'),
      fetch('/api/stocks'),
    ]);
    _data = await briefRes.json();
    const stocksData = await stocksRes.json();

    // 計算沈董PE/殖利率/等級 + 折價%，存到 _stocks
    (stocksData.data || []).forEach(s => {
      const eps = s.shen_eps;
      const div = s.shen_div;
      const close = s.close;
      if (!close || close <= 0) return;

      // 沈董PE = 股價 / 沈董EPS
      const pe = (eps && eps > 0) ? close / eps : null;
      // 沈董殖利率 = 沈董股利 / 股價 * 100
      const yld = (div && div > 0) ? div / close * 100 : null;

      let sg = null;
      if (eps != null && eps <= 0) sg = 'X';
      else if (pe != null && yld != null) sg = _calcShenGrade(pe, yld);
      if (!sg || sg === 'X' || sg === '觀察' || sg === '臨界點') return;

      const discount = (s.val_aa != null && s.val_aa > 0)
        ? Math.round((s.val_aa - close) / s.val_aa * 10000) / 100 : null;

      _stocks.push({
        code: s.code, name: s.name,
        shen_grade: sg,
        price: close,
        val_aa: s.val_aa,
        discount_pct: discount,
        shen_yld: yld != null ? Math.round(yld * 100) / 100 : null,
        shen_pe: pe != null ? Math.round(pe * 100) / 100 : null,
      });
    });

    // changes 也加上沈董等級
    const sgMap = {};
    _stocks.forEach(s => { sgMap[s.code] = s.shen_grade; });
    (_data.val_level_changes || []).forEach(c => { c.shen_grade = sgMap[c.code] || null; });

    if (_data.data_date) document.getElementById('dateLabel').textContent = `資料日期：${_data.data_date}`;
    updateCounts();
    renderTab();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444">無法載入</div>';
  }
}

function switchTab(tab, btn) {
  _tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTab();
}

function updateCounts() {
  const changes = _data.val_level_changes || [];
  document.getElementById('cntAA').textContent = _stocks.filter(s => s.shen_grade === 'AA').length;
  document.getElementById('cntCheap').textContent = _stocks.filter(s => ['A1','A2','A'].includes(s.shen_grade)).length;
  document.getElementById('cntChanges').textContent = changes.length || '';
}

function renderTab() {
  if (_tab === 'aa') renderList('AA');
  else if (_tab === 'cheap') renderList('cheap');
  else renderChanges();
}

function renderList(mode) {
  let items = mode === 'AA'
    ? _stocks.filter(s => s.shen_grade === 'AA')
    : _stocks.filter(s => ['A1','A2','A'].includes(s.shen_grade));

  // A1/A2/A tab 按沈董等級分組
  const groups = {};
  items.forEach(c => {
    const g = c.shen_grade;
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });

  const gradeOrder = ['AA','A1','A2','A'];
  const sortedGrades = Object.keys(groups).sort((a, b) => gradeOrder.indexOf(a) - gradeOrder.indexOf(b));

  const title = mode === 'AA' ? 'AA 級' : 'A1 / A2 / A 級';
  const headerColor = mode === 'AA' ? 'background:#fef2f2;color:#991b1b;border-color:#ef4444' : 'background:#fffbeb;color:#92400e;border-color:#f59e0b';

  let html = `<div class="section">
    <div class="section-header" style="${headerColor}">${title}
      <span style="font-weight:400;font-size:.82rem;margin-left:8px">共 ${items.length} 支</span>
    </div>`;

  sortedGrades.forEach(grade => {
    let gItems = groups[grade];
    if (!gItems.length) return;

    // 按折價%排序（正值在前=股價低於門檻）
    gItems.sort((a, b) => (b.discount_pct || -999) - (a.discount_pct || -999));

    if (mode !== 'AA') {
      const gcls = GRADE_CLS(grade);
      html += `<div style="padding:0 20px">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 0 4px;border-bottom:1px solid #e2e8f0">
          <span class="${gcls}" style="font-size:.9rem">沈董等級 ${grade}</span>
          <span style="font-size:.78rem;color:#94a3b8">${gItems.length} 支</span>
        </div>`;
    } else {
      html += '<div style="padding:0 20px">';
    }

    html += `<table class="val-table"><thead><tr>
        <th>代碼</th><th>名稱</th>
        <th style="text-align:right">股價</th><th style="text-align:right">AA門檻</th><th style="text-align:right">折價%</th>
        <th style="text-align:right">沈董PE</th><th style="text-align:right">殖利率</th>
      </tr></thead><tbody>`;

    gItems.forEach(c => {
      const dp = c.discount_pct;
      const dpColor = dp != null ? (dp >= 0 ? '#dc2626' : '#94a3b8') : '#cbd5e1';
      const dpStr = dp != null ? (dp >= 0 ? '+' : '') + dp.toFixed(1) + '%' : '-';

      html += `<tr>
        <td><a href="/company.html?code=${c.code}" target="_blank" style="font-weight:700;color:#2563eb;text-decoration:none">${c.code}</a></td>
        <td>${c.name}</td>
        <td style="text-align:right;font-weight:600">${c.price != null ? c.price.toFixed(2) : '-'}</td>
        <td style="text-align:right;color:#94a3b8">${c.val_aa != null ? c.val_aa.toFixed(2) : '-'}</td>
        <td style="text-align:right;color:${dpColor};font-weight:600">${dpStr}</td>
        <td style="text-align:right">${c.shen_pe != null ? c.shen_pe.toFixed(1) : '-'}</td>
        <td style="text-align:right;color:${(c.shen_yld||0) >= 5 ? '#059669' : '#475569'}">${c.shen_yld ? c.shen_yld.toFixed(1) + '%' : '-'}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderChanges() {
  const changes = _data.val_level_changes || [];
  const cheaper = changes.filter(c => c.direction === 'cheaper');
  const expensive = changes.filter(c => c.direction === 'expensive');

  let html = '';

  if (cheaper.length) {
    html += `<div class="section">
      <div class="section-header" style="background:#f0fdf4;color:#166534;border-color:#22c55e">今日變便宜（${cheaper.length} 支）</div>
      <div style="padding:0 20px">
      <table class="val-table"><thead><tr>
        <th>代碼</th><th>名稱</th><th>沈董等級</th><th>變動</th><th style="text-align:right">股價</th><th style="text-align:right">折價%</th><th>備註</th>
      </tr></thead><tbody>`;
    cheaper.forEach(c => {
      const gcls = GRADE_CLS(c.shen_grade);
      html += `<tr>
        <td><a href="/company.html?code=${c.code}" target="_blank" style="font-weight:700;color:#2563eb;text-decoration:none">${c.code}</a></td>
        <td>${c.name}</td>
        <td><span class="${gcls}">${c.shen_grade || '-'}</span></td>
        <td><span class="chg-add">${c.from || 'above'} → ${c.to}</span></td>
        <td style="text-align:right;font-weight:600">${c.price}</td>
        <td style="text-align:right;color:#dc2626;font-weight:600">${c.discount_pct != null ? c.discount_pct.toFixed(1) + '%' : '-'}</td>
        <td>${c.threshold_changed ? '<span style="color:#f59e0b;font-size:.72rem">門檻調整</span>' : ''}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  }

  if (expensive.length) {
    html += `<div class="section">
      <div class="section-header" style="background:#fef2f2;color:#991b1b;border-color:#ef4444">今日變貴（${expensive.length} 支）</div>
      <div style="padding:0 20px">
      <table class="val-table"><thead><tr>
        <th>代碼</th><th>名稱</th><th>沈董等級</th><th>變動</th><th style="text-align:right">股價</th>
      </tr></thead><tbody>`;
    expensive.forEach(c => {
      const gcls = GRADE_CLS(c.shen_grade);
      html += `<tr>
        <td><a href="/company.html?code=${c.code}" target="_blank" style="font-weight:700;color:#2563eb;text-decoration:none">${c.code}</a></td>
        <td>${c.name}</td>
        <td><span class="${gcls}">${c.shen_grade || '-'}</span></td>
        <td><span class="chg-rm">${c.from} → ${c.to || 'above'}</span></td>
        <td style="text-align:right">${c.price}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  }

  if (!changes.length) html = '<div style="text-align:center;padding:60px;color:#94a3b8">今日無評價等級異動</div>';
  document.getElementById('content').innerHTML = html;
}

load();
</script>
</body>
</html>
