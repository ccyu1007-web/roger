<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 成分股變動報告</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .88rem; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
  .loading { text-align: center; padding: 60px 0; color: #94a3b8; font-size: .95rem; }
  .empty-msg { text-align: center; padding: 40px 0; color: #94a3b8; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  thead th {
    background: #f8fafc; color: #475569; font-size: .82rem; font-weight: 700;
    padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2e8f0;
    position: sticky; top: 0; z-index: 1;
  }
  thead th.col-group { border-left: 2px solid #e2e8f0; }
  tbody tr { border-bottom: 1px solid #f1f5f9; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr.no-change { opacity: .5; }
  td { padding: 10px 12px; vertical-align: top; font-size: .85rem; }
  td.col-group { border-left: 2px solid #e2e8f0; }
  .etf-code { font-weight: 700; color: #1e3a5f; white-space: nowrap; }
  .etf-name { color: #475569; font-size: .8rem; }
  .stock-tag {
    display: inline-block; padding: 2px 7px; margin: 2px 2px; border-radius: 4px;
    font-size: .78rem; cursor: pointer; text-decoration: none;
  }
  .stock-tag:hover { opacity: .8; }
  .tag-add { background: #dcfce7; color: #166534; }
  .tag-remove { background: #fee2e2; color: #991b1b; }
  .tag-hold { background: #f1f5f9; color: #334155; }
  .count-badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: .72rem; font-weight: 700; margin-left: 4px;
  }
  .count-add { background: #bbf7d0; color: #166534; }
  .count-remove { background: #fecaca; color: #991b1b; }
  .filter-bar {
    display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    padding: 6px 12px; border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: .85rem; background: #fff;
  }
  .filter-bar label { font-size: .82rem; color: #64748b; }
  .summary { font-size: .85rem; color: #64748b; margin-bottom: 12px; }
  .dash { color: #cbd5e1; }
  .toggle-link { font-size:.78rem; color:#64748b; cursor:pointer; }
  .toggle-link:hover { color:#2563eb; }
  .th-group-label { text-align: center; font-size: .78rem; color: #94a3b8; padding: 4px 12px; border-bottom: 1px solid #e2e8f0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>ETF 成分股變動報告</h1>
  </div>
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <a href="/">回總表</a>
    <a href="/daily.html">新聞報告</a>
    <a href="/valuation.html">評價報告</a>
  </div>
</header>

<div class="container">
  <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:.82rem;color:#92400e;line-height:1.6">
    <strong>說明：</strong>本報告的異動資料來自系統定期比對各 ETF 持股清單的差異，並非直接取自臺灣指數公司或投信的官方公告。
    偵測日期與公告生效日可能有 1~2 天的時間差（例如 ETF 公告 4/20 生效，投信官網可能 4/21 才更新持股清單）。
    資料來源：元大系列為投信官網完整持股，其餘為 MoneyDJ 前 10 大持股。
  </div>
  <div class="filter-bar">
    <select id="etfFilter">
      <option value="">全部 ETF</option>
    </select>
    <label style="margin-left:8px"><input type="checkbox" id="hideNoChange" onchange="render()"> 隱藏無異動</label>
  </div>
  <div class="summary" id="summary"></div>
  <div id="content"><div class="loading">載入中...</div></div>
</div>

<script>
let allData = [];

async function load() {
  try {
    const res = await fetch('/api/etf/changes-report?limit=5000');
    allData = await res.json();

    buildFilter();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty-msg">載入失敗</div>';
  }
}

function buildFilter() {
  const sel = document.getElementById('etfFilter');
  const etfs = [...new Set(allData.map(g => g.etf_code))].sort();
  etfs.forEach(code => {
    const name = allData.find(g => g.etf_code === code)?.etf_name || code;
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${code} ${name}`;
    sel.appendChild(opt);
  });
  sel.onchange = render;
}

function stockTags(list, cls) {
  if (!list.length) return '<span class="dash">－</span>';
  return list.map(s =>
    `<a class="stock-tag ${cls}" href="/company.html?code=${s.code}" target="_blank">${s.code} ${s.name}</a>`
  ).join('') + `<span class="count-badge ${cls === 'tag-add' ? 'count-add' : 'count-remove'}">${cls === 'tag-add' ? '+' : '-'}${list.length}</span>`;
}

function render() {
  const etfVal = document.getElementById('etfFilter').value;
  const hideNoChange = document.getElementById('hideNoChange').checked;
  const today = new Date().toISOString().split('T')[0];

  let data = allData;
  if (etfVal) data = data.filter(g => g.etf_code === etfVal);

  // 按 ETF 分組，彙整今日 + 區間
  const etfMap = {};
  data.forEach(g => {
    if (!etfMap[g.etf_code]) {
      etfMap[g.etf_code] = {
        etf_code: g.etf_code,
        etf_name: g.etf_name,
        holdings: g.holdings || [],
        today_add: [], today_remove: [],
        range_add: [], range_remove: [],
        _today_add_set: new Set(), _today_remove_set: new Set(),
        _range_add_set: new Set(), _range_remove_set: new Set()
      };
    }
    const e = etfMap[g.etf_code];
    // 今日
    if (g.change_date === today) {
      g.add.forEach(s => { if (!e._today_add_set.has(s.code)) { e._today_add_set.add(s.code); e.today_add.push(s); }});
      g.remove.forEach(s => { if (!e._today_remove_set.has(s.code)) { e._today_remove_set.add(s.code); e.today_remove.push(s); }});
    }
    // 區間（含今日）
    g.add.forEach(s => { if (!e._range_add_set.has(s.code)) { e._range_add_set.add(s.code); e.range_add.push(s); }});
    g.remove.forEach(s => { if (!e._range_remove_set.has(s.code)) { e._range_remove_set.add(s.code); e.range_remove.push(s); }});
  });

  let etfs = Object.values(etfMap);
  // 有異動的排前面
  etfs.sort((a, b) => {
    const aHas = a.range_add.length + a.range_remove.length;
    const bHas = b.range_add.length + b.range_remove.length;
    if (bHas !== aHas) return bHas - aHas;
    return a.etf_code.localeCompare(b.etf_code);
  });

  if (hideNoChange) {
    etfs = etfs.filter(e => e.range_add.length + e.range_remove.length > 0);
  }

  const box = document.getElementById('content');
  if (!etfs.length) {
    box.innerHTML = '<div class="empty-msg">無異動紀錄</div>';
    document.getElementById('summary').textContent = '';
    return;
  }

  const totalAdd = etfs.reduce((s, e) => s + e.range_add.length, 0);
  const totalRemove = etfs.reduce((s, e) => s + e.range_remove.length, 0);
  const todayAdd = etfs.reduce((s, e) => s + e.today_add.length, 0);
  const todayRemove = etfs.reduce((s, e) => s + e.today_remove.length, 0);
  document.getElementById('summary').textContent =
    `今日：納入 ${todayAdd} 支、剔除 ${todayRemove} 支｜區間：納入 ${totalAdd} 支、剔除 ${totalRemove} 支`;

  const dates = data.map(g => g.change_date).sort();
  const earliest = dates.length ? dates[0] : '';
  const latest = dates.length ? dates[dates.length - 1] : '';
  const rangeLabel = earliest && latest && earliest !== latest
    ? `歷史累計 (${earliest} ~ ${latest})`
    : earliest ? `歷史累計 (${earliest})` : '歷史累計';

  let html = `<table>
    <thead>
      <tr>
        <th rowspan="2" style="width:120px">ETF</th>
        <th rowspan="2">成分股</th>
        <th colspan="2" class="col-group" style="text-align:center;border-bottom:1px solid #e2e8f0">今日異動 (${today})</th>
        <th colspan="2" class="col-group" style="text-align:center;border-bottom:1px solid #e2e8f0">${rangeLabel}</th>
      </tr>
      <tr>
        <th class="col-group">納入</th>
        <th>剔除</th>
        <th class="col-group">納入</th>
        <th>剔除</th>
      </tr>
    </thead><tbody>`;

  etfs.forEach(e => {
    const hasChange = e.range_add.length + e.range_remove.length > 0;
    const trCls = hasChange ? '' : ' class="no-change"';

    const holdingsHtml = e.holdings.length
      ? `<span class="toggle-link" onclick="const t=this.nextElementSibling;t.style.display=t.style.display==='none'?'inline':'none';this.textContent=t.style.display==='none'?'展開 ${e.holdings.length} 支':'收合'">展開 ${e.holdings.length} 支</span>`
        + `<span style="display:none">${e.holdings.map(s => `<a class="stock-tag tag-hold" href="/company.html?code=${s.code}" target="_blank">${s.code} ${s.name}</a>`).join('')}</span>`
      : '<span class="dash">－</span>';

    html += `<tr${trCls}>
      <td><span class="etf-code">${e.etf_code}</span><br><span class="etf-name">${e.etf_name}</span></td>
      <td>${holdingsHtml}</td>
      <td class="col-group">${stockTags(e.today_add, 'tag-add')}</td>
      <td>${stockTags(e.today_remove, 'tag-remove')}</td>
      <td class="col-group">${stockTags(e.range_add, 'tag-add')}</td>
      <td>${stockTags(e.range_remove, 'tag-remove')}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  box.innerHTML = html;
}

load();
</script>
</body>
</html>
